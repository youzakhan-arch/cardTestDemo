<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motive Driver Card — Prototype</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── PHX Design System Tokens ─────────────────────────────────────────────── */
    :root {
      /* Background */
      --phx-bg-primary:        #ffffff;
      --phx-bg-secondary:      #FCFCFC;
      --phx-bg-tertiary:       #F7F7F7;
      --phx-bg-active:         #E5F4FF;
      --phx-bg-bold-accent:    #0073E7;
      --phx-bg-negative:       #EA1000;
      --phx-bg-positive:       #228739;
      --phx-bg-caution:        #9D6D00;
      --phx-bg-hover:          rgba(0,0,0,0.05);
      --phx-bg-pressed:        rgba(0,0,0,0.11);
      --phx-bg-inactive:       rgba(0,0,0,0.05);
      /* Content */
      --phx-content-primary:   rgba(0,0,0,0.82);
      --phx-content-secondary: rgba(0,0,0,0.63);
      --phx-content-active:    #0058C8;
      --phx-content-on-bold:   #ffffff;
      --phx-content-inactive:  rgba(0,0,0,0.33);
      --phx-content-negative:  #BD0E00;
      --phx-content-positive:  #1B6C2D;
      --phx-content-caution:   #7D5800;
      /* Stroke */
      --phx-stroke-default:    rgba(0,0,0,0.10);
      --phx-stroke-active:     #0073E7;
      /* Tint backgrounds for badges */
      --phx-accent-light:      #DBEEFF;
      --phx-accent-light-fg:   #0058C8;
      --phx-positive-light:    #DCFCE7;
      --phx-positive-light-fg: #1B6C2D;
      --phx-negative-light:    #FFE4E1;
      --phx-negative-light-fg: #BD0E00;
      --phx-caution-light:     #FEF3C7;
      --phx-caution-light-fg:  #7D5800;
      --phx-neutral-light:     #F3F4F6;
      --phx-neutral-light-fg:  rgba(0,0,0,0.63);
      /* Border radius (PHX scale) */
      --phx-r-sm:  2px;
      --phx-r-md:  4px;
      --phx-r-lg:  8px;
      --phx-r-xl:  12px;
      --phx-r-full: 9999px;
      /* Motion */
      --phx-dur-fast:   100ms;
      --phx-dur-normal: 200ms;
      --phx-dur-slow:   400ms;
      --phx-ease:       ease-in-out;
      /* PHX composite tokens (non-prefixed, from PHX theme) */
      --summary:            #2E2E2E;   /* grey-80 — summary bar / dark headers */
      --sidebar:            #1A1A1A;   /* sidebar panel background */
      --sidebar-foreground: rgba(255,255,255,0.57); /* sidebar nav item text */
    }
    body { margin: 0; background: var(--phx-bg-tertiary); font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 0; }
    input:focus { outline: none; }
    button { cursor: pointer; border: none; background: none; padding: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- @ds-mo/icons sprite — injected once, referenced via <use href="#id"> -->
  <div id="ds-mo-sprite" style="display:none;position:absolute;width:0;height:0;overflow:hidden"></div>
  <script>
    fetch('https://unpkg.com/@ds-mo/icons@4.3.1/dist/sprite.svg')
      .then(function(r){ return r.text(); })
      .then(function(html){ document.getElementById('ds-mo-sprite').innerHTML = html; })
      .catch(function(e){ console.warn('@ds-mo/icons sprite failed to load', e); });
  </script>

  <script type="text/babel">
  // ─────────────────────────────────────────────────────────────────────────────
  // PM RATIONALE — Recent Transactions on Card List Screen (Change 2 / Ideation B):
  // 1. Drivers manage multiple cards and need a unified spending snapshot without
  //    drilling into each card individually.
  // 2. Recent transaction visibility reduces "did my payment go through?" support contacts.
  // 3. It mirrors familiar patterns from consumer banking apps (Apple Card, Chase Mobile)
  //    that drivers already use — reducing cognitive load.
  // 4. Fleet managers confirmed in research that declined transactions are the #1 reason
  //    drivers call dispatch — showing Declined status prominently on the home screen
  //    enables faster self-service resolution.
  // ─────────────────────────────────────────────────────────────────────────────

  const { useState } = React;

  // ── PHX token shorthands (CDN substitute for CSS utility classes) ─────────────
  const C = {
    bgPrimary:    'var(--phx-bg-primary)',
    bgSecondary:  'var(--phx-bg-secondary)',
    bgTertiary:   'var(--phx-bg-tertiary)',
    bgActive:     'var(--phx-bg-active)',
    bgAccent:     'var(--phx-bg-bold-accent)',
    bgNegative:   'var(--phx-bg-negative)',
    bgPositive:   'var(--phx-bg-positive)',
    bgPressed:    'var(--phx-bg-pressed)',
    bgHover:      'var(--phx-bg-hover)',
    bgInactive:   'var(--phx-bg-inactive)',
    textPrimary:  'var(--phx-content-primary)',
    textSecondary:'var(--phx-content-secondary)',
    textActive:   'var(--phx-content-active)',
    textOnBold:   'var(--phx-content-on-bold)',
    textInactive: 'var(--phx-content-inactive)',
    textNeg:      'var(--phx-content-negative)',
    textPos:      'var(--phx-content-positive)',
    textCaution:  'var(--phx-content-caution)',
    stroke:       'var(--phx-stroke-default)',
    strokeActive: 'var(--phx-stroke-active)',
    rMd:          'var(--phx-r-md)',
    rLg:          'var(--phx-r-lg)',
    rXl:          'var(--phx-r-xl)',
    rFull:        'var(--phx-r-full)',
  };

  // ── Data ──────────────────────────────────────────────────────────────────────

  const CARDS = [
    { id: '198344', name: '198344', number: '•••• 1234', type: 'virtual', vehicle: 'Truck #198344', gradient: ['#0F2847', '#1E3A5F'], availableLimit: '$524.79', assignedTo: 'Jasper Benjamin (•••• 1234)' },
    { id: 'figma',  name: 'Figma Subscrip. Card', number: '•••• 8910', type: 'virtual', vehicle: null, gradient: ['#0a1929', '#123456'], availableLimit: '$1,200.00', assignedTo: 'Jasper Benjamin (•••• 8910)' },
    { id: 'subs',   name: 'Subscriptions misc',   number: '•••• 2345', type: 'physical', vehicle: 'Truck #2345', gradient: ['#1A2E4A', '#0D1F35'], availableLimit: '$320.50', assignedTo: 'Jasper Benjamin (•••• 2345)' },
  ];

  const TRANSACTIONS = [
    { id: 1, merchant: 'Amazon',         amount: '$141.75', status: 'Pending',  cardId: 'figma',  cardName: 'Figma Subscrip. Card', cardNum: '••••8910', date: 'Today',     category: 'Online Shopping' },
    { id: 2, merchant: "Love's",         amount: '$50.00',  status: 'Declined', cardId: 'subs',   cardName: 'Subscriptions misc',   cardNum: '••••2345', date: 'Today',     category: 'Fuel', declineReason: 'Transaction limit reached ($50.00)' },
    { id: 3, merchant: 'ARCO',           amount: '$210.11', status: 'Posted',   cardId: '198344', cardName: '198344',               cardNum: '••••1234', date: 'Yesterday', category: 'Fuel' },
    { id: 4, merchant: 'Pilot Flying J', amount: '$85.40',  status: 'Posted',   cardId: '198344', cardName: '198344',               cardNum: '••••1234', date: 'Yesterday', category: 'Fuel' },
    { id: 5, merchant: 'Walmart',        amount: '$34.20',  status: 'Posted',   cardId: 'subs',   cardName: 'Subscriptions misc',   cardNum: '••••2345', date: 'May 24',    category: 'General Merchandise' },
  ];

  // Driver App Core (mobile DS): transaction status is COLORED TEXT, not a pill.
  // Pending = grey-60, Declined = red-60, Posted = green-60.
  const STATUS_COLOR = {
    Pending:       '#5E5E5E',  // grey/grey-60
    Declined:      '#BD0E00',  // red/red-60
    Posted:        '#1B6C2D',  // green/green-60
    RefundPending: '#7D5800',  // caution
  };

  // Mock spend controls — mirrors GET /fleetcard/driverapp/v3/spend_controls response
  const SPEND_CONTROLS = {
    '198344': {
      available_limit: 524.79, spend_limit: 600.00, daily_limit: 600.00,
      per_transaction_limit: 200.00, fuel_limit: 150.00,
      period_spent: 75.21, period_label: 'This week',
      restrictions: [
        { label: 'Fuel & Maintenance', allowed: true },
        { label: 'Restaurants / Fast Food', allowed: false },
        { label: 'Cash Advances', allowed: false },
        { label: 'Out-of-network ATM', allowed: false },
      ],
    },
    'figma': {
      available_limit: 1200.00, spend_limit: 1200.00, daily_limit: 1200.00,
      per_transaction_limit: 500.00, fuel_limit: null,
      period_spent: 0, period_label: 'This week',
      restrictions: [],
    },
    'subs': {
      available_limit: 320.50, spend_limit: 400.00, daily_limit: 400.00,
      per_transaction_limit: 150.00, fuel_limit: null,
      period_spent: 79.50, period_label: 'This week',
      restrictions: [
        { label: 'Fuel & Maintenance', allowed: false },
        { label: 'Subscriptions', allowed: true },
      ],
    },
  };

  const DEACTIVATED_CARDS = [
    { id: 'old1', name: 'Fleet Card #88421', number: '•••• 8421', type: 'physical', vehicle: 'Truck #88421', gradient: ['#2E2E2E', '#1A1A1A'], deactivatedOn: 'Mar 12, 2026' },
    { id: 'old2', name: 'Fuel Card Backup',  number: '•••• 6673', type: 'virtual',  vehicle: null,           gradient: ['#2E2E2E', '#1A1A1A'], deactivatedOn: 'Jan 4, 2026' },
  ];

  // ── @ds-mo/icons — single sprite-based component ──────────────────────────────
  // Sprite is fetched and injected into #ds-mo-sprite in <head>; all icons are
  // 16×16 viewBox, fill="currentColor". Pass color="inherit" to let parent set it.

  const Icon = ({ name, size = 20, color = 'currentColor' }) => (
    <svg
      width={size} height={size} viewBox="0 0 16 16"
      fill={color} aria-hidden="true"
      style={{ display: 'inline-block', flexShrink: 0, verticalAlign: 'middle' }}
    >
      <use href={`#${name}`} />
    </svg>
  );

  // ── Motive wordmark — official logo (Figma node 2094:4261, "new-logo") ────────
  // Vector at viewBox 108×24.9449. preserveAspectRatio="xMidYMid meet" → scales to
  // fit the container without stretching (the source asset shipped with "none").
  const MotiveLogo = ({ width = 108, height = 32, color = 'white' }) => (
    <svg width={width} height={height} viewBox="0 0 108 24.9449" fill="none"
         preserveAspectRatio="xMidYMid meet" aria-label="Motive"
         xmlns="http://www.w3.org/2000/svg" style={{ display: 'block' }}>
      <path d="M59.1415 10.2776V20.4907L63.3205 20.4822V24.7292H54.3866V10.2742H51.6838V6.136H54.3849V0H59.1415V6.1394H63.3205V10.2776H59.1415Z" fill={color}/>
      <path d="M70.0884 0V4.23336H70.0866V4.23676H65.3419V0H70.0884Z" fill={color}/>
      <path d="M18.3349 6.13428H12.6525L4.15861 20.4907H0V24.7376H6.64054L13.5903 12.9804V24.7292H19.1962L26.1137 12.9464V24.7292H30.8703V6.13428H25.1623L18.3349 17.6656V6.13428Z" fill={color}/>
      <path d="M65.3369 6.13428H70.0935V24.7292H65.3369V6.13428Z" fill={color}/>
      <path fillRule="evenodd" clipRule="evenodd" d="M41.999 5.91854H42.0346C47.1514 5.91854 51.2216 10.2063 51.2216 15.4317C51.2216 20.6572 47.1514 24.9449 42.0346 24.9449H41.999C36.8839 24.9449 32.7763 20.6979 32.7763 15.4317C32.7763 10.1655 36.8839 5.91854 41.999 5.91854ZM41.999 20.1883H42.0346V20.1849C44.5216 20.1849 46.4668 18.0597 46.4701 15.4317C46.4701 12.836 44.4843 10.6751 42.0346 10.6751H41.999C39.478 10.6751 37.5329 12.8003 37.5329 15.4317C37.5329 18.0631 39.478 20.1883 41.999 20.1883Z" fill={color}/>
      <path fillRule="evenodd" clipRule="evenodd" d="M99.4857 20.72C101.397 20.72 102.588 19.6039 102.912 18.6288H107.669C107.489 20.1798 105.433 24.9415 99.4823 24.9415C94.1091 24.9415 90.139 20.9018 90.139 15.4181C90.139 10.0449 94.2161 5.89646 99.3362 5.89646C104.205 5.89646 108 10.1519 108 15.3468C108 15.887 107.964 16.3932 107.929 16.7534H95.0179C95.339 19.0263 96.7099 20.72 99.4857 20.72ZM95.1691 13.3626H103.318C102.809 11.494 101.551 10.1162 99.3515 10.1162C97.0463 10.1162 95.7042 11.4515 95.1691 13.3626Z" fill={color}/>
      <path d="M81.4261 18.301L85.9585 6.13769V6.14788H91.0259L83.7891 24.7292H79.002L71.8076 6.13769H76.8938L81.4261 18.301Z" fill={color}/>
    </svg>
  );

  // ── Mini card thumbnail (57×40px) ────────────────────────────────────────────

  function MiniCard({ card }) {
    return (
      <div style={{
        position: 'relative', width: 57, height: 40, borderRadius: 4, overflow: 'hidden', flexShrink: 0,
        background: `linear-gradient(145deg, ${card.gradient[0]} 0%, ${card.gradient[1]} 100%)`,
      }}>
        {/* Contactless arcs */}
        <svg style={{ position: 'absolute', top: 4, right: 4 }} width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M5 2 Q8 5 5 8" stroke="rgba(255,255,255,0.5)" strokeWidth="1" fill="none"/>
          <path d="M5 0 Q10 5 5 10" stroke="rgba(255,255,255,0.3)" strokeWidth="1" fill="none"/>
        </svg>
        {/* Chip (physical) */}
        {card.type === 'physical' && (
          <div style={{ position: 'absolute', left: 6, top: 13, width: 10, height: 7, borderRadius: 1, background: 'linear-gradient(135deg, #d4a843 0%, #f5c842 100%)' }}/>
        )}
        {/* Last 4 */}
        <span style={{ position: 'absolute', fontFamily: 'monospace', fontSize: 4.5, color: 'rgba(255,255,255,0.6)', left: 5, bottom: 5, letterSpacing: '0.5px' }}>
          {card.number.replace('•••• ', '')}
        </span>
        {/* Mastercard */}
        <div style={{ position: 'absolute', right: 4, bottom: 4, display: 'flex' }}>
          <div style={{ width: 9, height: 9, borderRadius: '50%', background: 'rgba(220,56,56,0.85)' }}/>
          <div style={{ width: 9, height: 9, borderRadius: '50%', background: 'rgba(251,140,0,0.85)', marginLeft: -4 }}/>
        </div>
      </div>
    );
  }

  // ── Large card face (120×84px) ────────────────────────────────────────────────

  function CardFace({ card, showDetails }) {
    return (
      <div style={{
        position: 'relative', width: 120, height: 84, borderRadius: 8, overflow: 'hidden', flexShrink: 0,
        background: `linear-gradient(145deg, ${card.gradient[0]} 0%, ${card.gradient[1]} 100%)`,
        boxShadow: '0 4px 16px rgba(0,0,0,0.3)',
      }}>
        <span style={{ position: 'absolute', top: 7, left: 8, fontSize: 9, fontWeight: 700, fontStyle: 'italic', color: 'rgba(255,255,255,0.8)', letterSpacing: '-0.5px' }}>motive</span>
        <svg style={{ position: 'absolute', top: 7, right: 7 }} width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 3 Q11 7 7 11" stroke="rgba(255,255,255,0.5)" strokeWidth="1.2" fill="none"/>
          <path d="M7 0.5 Q13.5 7 7 13.5" stroke="rgba(255,255,255,0.3)" strokeWidth="1.2" fill="none"/>
        </svg>
        {card.type === 'physical' && (
          <div style={{ position: 'absolute', left: 10, top: 28, width: 16, height: 12, borderRadius: 2, background: 'linear-gradient(135deg, #d4a843 0%, #f5c842 100%)' }}/>
        )}
        <span style={{ position: 'absolute', fontFamily: 'monospace', fontSize: 7, color: 'rgba(255,255,255,0.7)', left: 10, bottom: 20, letterSpacing: '1px' }}>
          {showDetails ? '4521 8821 5532 8910' : '•••• •••• •••• ' + card.number.slice(-4)}
        </span>
        <div style={{ position: 'absolute', right: 8, bottom: 7, display: 'flex' }}>
          <div style={{ width: 14, height: 14, borderRadius: '50%', background: 'rgba(220,56,56,0.85)' }}/>
          <div style={{ width: 14, height: 14, borderRadius: '50%', background: 'rgba(251,140,0,0.85)', marginLeft: -7 }}/>
        </div>
      </div>
    );
  }

  // ── Status bar ────────────────────────────────────────────────────────────────

  function StatusBar() {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 44, padding: '0 24px', backgroundColor: '#0F172A', flexShrink: 0 }}>
        <span style={{ color: 'white', fontSize: 13, fontWeight: 600, letterSpacing: '-0.3px' }}>9:41</span>
        <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="white"><rect x="0" y="5" width="3" height="7" rx="0.5"/><rect x="4.5" y="3.5" width="3" height="8.5" rx="0.5"/><rect x="9" y="1.5" width="3" height="10.5" rx="0.5"/><rect x="13.5" y="0" width="3" height="12" rx="0.5"/></svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M5 7 Q8 4.5 11 7" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round"/><path d="M2.5 4.5 Q8 0 13.5 4.5" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round"/><circle cx="8" cy="10" r="1.2"/></svg>
          <div style={{ display: 'flex', alignItems: 'center' }}>
            <div style={{ position: 'relative', border: '1px solid white', borderRadius: 2, width: 22, height: 11, display: 'flex', alignItems: 'center' }}>
              <div style={{ position: 'absolute', left: 1, top: 1, bottom: 1, right: 4, background: 'white', borderRadius: 1 }}/>
            </div>
            <div style={{ width: 1.5, height: 5, background: 'rgba(255,255,255,0.6)', borderRadius: '0 1px 1px 0', marginLeft: 1 }}/>
          </div>
        </div>
      </div>
    );
  }

  // ── Transaction row ───────────────────────────────────────────────────────────

  // ── Transaction row — Driver App Core spec (node 2094:4408) ───────────────────
  // Layout: [merchant · amount] over [meta · colored status]. No pill, no avatar.
  // Type: Inter — line 1 = 16/24 tracking -0.176px, line 2 = 14/20 tracking -0.0084px.
  function TxRow({ tx, showCard = true }) {
    const [pressed, setPressed] = useState(false);
    const statusColor = STATUS_COLOR[tx.status] || STATUS_COLOR['Posted'];
    return (
      <div
        style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '0 16px', cursor: 'pointer', background: pressed ? C.bgHover : C.bgPrimary, transition: 'background 75ms', userSelect: 'none' }}
        onPointerDown={() => setPressed(true)}
        onPointerUp={() => setPressed(false)}
        onPointerLeave={() => setPressed(false)}
      >
        <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: 2, padding: '8px 0' }}>
          {/* Line 1: merchant + amount */}
          <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start', fontSize: 16, lineHeight: '24px', letterSpacing: '-0.176px' }}>
            <span style={{ flex: 1, minWidth: 0, fontWeight: 400, color: '#000000', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{tx.merchant}</span>
            <span style={{ flexShrink: 0, fontWeight: 600, color: 'rgba(0,0,0,0.82)', textAlign: 'right', whiteSpace: 'nowrap' }}>{tx.amount}</span>
          </div>
          {/* Line 2: meta (card number / date) + colored status text */}
          <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start', fontSize: 14, fontWeight: 400, lineHeight: '20px', letterSpacing: '-0.0084px' }}>
            <span style={{ flex: 1, minWidth: 0, color: 'rgba(0,0,0,0.63)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
              {showCard ? tx.cardNum : tx.date}
            </span>
            <span style={{ flexShrink: 0, color: statusColor, whiteSpace: 'nowrap' }}>{tx.status}</span>
          </div>
        </div>
        <Icon name="chevron-right" size={24} color="rgba(0,0,0,0.33)" />
      </div>
    );
  }

  // ── Nav Drawer ────────────────────────────────────────────────────────────────

  // Sidebar items mirror Driver App Core "new-sidebar" (node 2094:4263), in order,
  // with @ds-mo/icons matching the Figma icon set.
  const NAV_ITEMS = [
    { label: 'Home',                icon: 'building-home' },
    { label: 'Logs',                icon: 'chart' },
    { label: 'Roadside Inspection', icon: 'shield-circle' },
    { label: 'Performance',         icon: 'trophy' },
    { label: 'Savings Finder',      icon: 'target-dollar' },
    { label: 'Motive Card',         icon: 'card', active: true },
    { label: 'Messages',            icon: 'message-bubble-stack' },
    { label: 'Notifications',       icon: 'bell' },
    { label: 'Dispatches',          icon: 'location-pin-arrows' },
    { label: 'Documents',           icon: 'document' },
    { label: 'Tire Pressure',       icon: 'tire-pressure' },
    { label: 'Settings',            icon: 'gear' },
    { label: 'Help Center',         icon: 'circle-question' },
  ];

  function NavDrawer({ onClose }) {
    return (
      <>
        {/* Scrim */}
        <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.5)', zIndex:40 }} />
        {/* Drawer panel — Driver App Core "new-sidebar": always-dark #171717 */}
        <div style={{ position:'absolute', top:0, left:0, bottom:0, width:300, background:'#171717', zIndex:50, display:'flex', flexDirection:'column', overflowY:'auto' }}>
          {/* app-branding — logo 108×32, scaled to fit (not stretched) */}
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', padding:'48px 20px 12px 16px' }}>
            <MotiveLogo width={108} height={32} color="white" />
          </div>
          {/* items — p-8, each row p-16 gap-12 rounded-8 */}
          <div style={{ flex:1, display:'flex', flexDirection:'column', padding:8 }}>
            {NAV_ITEMS.map(item => (
              <div key={item.label} onClick={onClose} style={{
                display:'flex', alignItems:'center', gap:12, padding:16, borderRadius:8, width:'100%',
                background: item.active ? '#2E2E2E' : 'transparent',  // background/on-always-dark/active
                cursor:'pointer',
              }}>
                <Icon name={item.icon} size={24} color="white" />

  // ── Transactions Screen ───────────────────────────────────────────────────────

  function TransactionsScreen({ onBack, onViewTxDetail }) {
    const [filter, setFilter] = useState('All');
    const filters = ['All', 'Pending', 'Declined', 'Posted'];
    const filtered = filter === 'All' ? TRANSACTIONS : TRANSACTIONS.filter(t => t.status === filter);
    const groups = {};
    filtered.forEach(tx => {
      const d = tx.date.split(',')[0];
      if (!groups[d]) groups[d] = [];
      groups[d].push(tx);
    });

    return (
      <div style={{ display: 'flex', flexDirection: 'column', flex: 1, background: C.bgTertiary, overflow: 'hidden' }}>
        {/* Nav */}
        <div style={{ display: 'flex', alignItems: 'center', height: 56, padding: '0 16px', background: C.bgPrimary, borderBottom: `1px solid ${C.stroke}`, flexShrink: 0, position: 'relative' }}>

            <Icon name="arrow-left" size={20} />
          </button>
          <span style={{ position: 'absolute', left: 0, right: 0, textAlign: 'center', fontSize: 20, fontWeight: 600, letterSpacing: '-0.34px', color: C.textPrimary, pointerEvents: 'none' }}>Transactions</span>
        </div>

        {/* Filter chips — PHX FilterRow pattern approximated in CDN context */}
        <div style={{ display: 'flex', gap: 8, padding: '10px 16px', background: C.bgPrimary, borderBottom: `1px solid ${C.stroke}`, flexShrink: 0 }}>
          {filters.map(f => (
            <button key={f} onClick={() => setFilter(f)} style={{ flexShrink: 0, padding: '0 14px', height: 32, borderRadius: 999, fontSize: 13, fontWeight: 500, cursor: 'pointer', border: 'none', background: f === filter ? C.bgAccent : C.bgTertiary, color: f === filter ? C.textOnBold : C.textSecondary }}>
              {f}
            </button>
          ))}
        </div>

        {/* Grouped list */}
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {Object.entries(groups).map(([date, txs]) => (
            <div key={date} style={{ marginTop: 12 }}>
              <div style={{ padding: '0 16px 6px' }}>
                <span style={{ fontSize: 12, fontWeight: 600, color: C.textSecondary, textTransform: 'uppercase', letterSpacing: '0.08em' }}>{date}</span>
              </div>
              <div style={{ background: C.bgPrimary }}>
                {txs.map((tx, i) => (
                  <React.Fragment key={tx.id}>
                    <div onClick={() => onViewTxDetail && onViewTxDetail(tx)}>
                      <TxRow tx={tx} showCard={true} />
                    </div>
                    {i < txs.length - 1 && <div style={{ height: 1, background: '#E3E3E3' }}/>}
                  </React.Fragment>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── PIN Modal (Unlock card flow from Figma) ───────────────────────────────────

  function PinModal({ onSuccess, onCancel }) {
    const [digits, setDigits] = useState([]);
    const press = (d) => {
      if (digits.length >= 4) return;
      const next = [...digits, d];
      setDigits(next);
      if (next.length === 4) setTimeout(onSuccess, 320);
    };
    const del = () => setDigits(digits.slice(0, -1));
    const numBtn = (label, action) => (
      <button onClick={action} style={{ width: 72, height: 72, borderRadius: '50%', background: label === '⌫' ? 'transparent' : 'rgba(255,255,255,0.14)', color: 'white', fontSize: label === '⌫' ? 20 : 26, fontWeight: 300, border: 'none', cursor: 'pointer', transition: `background ${C.rMd}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {label}
      </button>
    );
    return (
      <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.88)', zIndex: 30, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ fontSize: 20, fontWeight: 600, color: 'white', marginBottom: 6 }}>Enter PIN</div>
        <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.5)', marginBottom: 36 }}>to unlock this card</div>
        <div style={{ display: 'flex', gap: 18, marginBottom: 44 }}>
          {[0,1,2,3].map(i => (
            <div key={i} style={{ width: 14, height: 14, borderRadius: '50%', border: '2px solid rgba(255,255,255,0.6)', background: digits[i] !== undefined ? 'white' : 'transparent', transition: `background var(--phx-dur-fast) var(--phx-ease)` }} />
          ))}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 72px)', gap: 14 }}>
          {[1,2,3,4,5,6,7,8,9].map(n => numBtn(String(n), () => press(n)))}
          <div />{numBtn('0', () => press(0))}{numBtn('⌫', del)}
        </div>
        <button onClick={onCancel} style={{ marginTop: 36, color: 'rgba(255,255,255,0.6)', fontSize: 15, background: 'transparent', border: 'none', cursor: 'pointer' }}>Cancel</button>
      </div>
    );
  }

  // ── Spend Limits Screen (Figma: "View spend limits" flow) ─────────────────────

  function SpendLimitsScreen({ card, onBack }) {
    const sc = SPEND_CONTROLS[card.id] || {};
    const pct = sc.spend_limit > 0 ? Math.round((sc.period_spent / sc.spend_limit) * 100) : 0;
    const fmt = v => v != null ? `$${Number(v).toFixed(2)}` : '—';
    const limitRows = [
      { label: 'Per transaction', value: fmt(sc.per_transaction_limit) },
      { label: 'Daily limit',     value: fmt(sc.daily_limit) },
      sc.fuel_limit != null && { label: 'Fuel per fill-up', value: fmt(sc.fuel_limit) },
    ].filter(Boolean);
    return (
      <div style={{ display: 'flex', flexDirection: 'column', flex: 1, background: C.bgTertiary, overflow: 'hidden' }}>
        <div style={{ display: 'flex', alignItems: 'center', height: 56, padding: '0 16px', background: C.bgPrimary, borderBottom: `1px solid ${C.stroke}`, flexShrink: 0, position: 'relative' }}>
          <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '8px 8px 8px 0', display: 'flex', alignItems: 'center', color: C.textActive, zIndex: 1 }} onClick={onBack}><Icon name="arrow-left" size={20} /></button>
          <span style={{ position: 'absolute', left: 0, right: 0, textAlign: 'center', fontSize: 20, fontWeight: 600, letterSpacing: '-0.34px', color: C.textPrimary, pointerEvents: 'none' }}>Spend Limits</span>
        </div>
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {/* Period summary card */}
          <div style={{ background: C.bgPrimary, margin: '12px 16px 0', borderRadius: 'var(--phx-r-xl)', overflow: 'hidden', boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
            <div style={{ padding: '18px 16px 16px' }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: C.textSecondary, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>{sc.period_label || 'This week'}</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
                <span style={{ fontSize: 28, fontWeight: 700, color: C.textPrimary }}>{fmt(sc.period_spent)}</span>
                <span style={{ fontSize: 13, color: C.textSecondary }}>of {fmt(sc.spend_limit)} limit</span>
              </div>
              <div style={{ height: 6, borderRadius: 'var(--phx-r-full)', background: C.bgTertiary, overflow: 'hidden', marginBottom: 6 }}>
                <div style={{ height: '100%', width: `${Math.min(pct, 100)}%`, borderRadius: 'var(--phx-r-full)', background: pct > 80 ? C.bgNegative : C.bgAccent, transition: 'width var(--phx-dur-slow) var(--phx-ease)' }} />
              </div>
              <div style={{ fontSize: 12, color: C.textSecondary }}>{pct}% used · {fmt(sc.available_limit)} available</div>
            </div>
          </div>
          {/* Limit rows */}
          <div style={{ background: C.bgPrimary, margin: '10px 16px 0', borderRadius: 'var(--phx-r-xl)', overflow: 'hidden', boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
            <div style={{ padding: '12px 16px 4px', fontSize: 11, fontWeight: 600, color: C.textSecondary, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Limits</div>
            {limitRows.map((row, i) => (
              <React.Fragment key={row.label}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0 16px', height: 52 }}>
                  <span style={{ fontSize: 15, color: C.textPrimary }}>{row.label}</span>
                  <span style={{ fontSize: 15, fontWeight: 600, color: C.textPrimary }}>{row.value}</span>
                </div>
                {i < limitRows.length - 1 && <div style={{ height: 1, background: C.stroke, marginLeft: 16 }} />}
              </React.Fragment>
            ))}
          </div>
          {/* Category restrictions */}
          {sc.restrictions?.length > 0 && (
            <div style={{ background: C.bgPrimary, margin: '10px 16px 24px', borderRadius: 'var(--phx-r-xl)', overflow: 'hidden', boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
              <div style={{ padding: '12px 16px 4px', fontSize: 11, fontWeight: 600, color: C.textSecondary, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Merchant Categories</div>
              {sc.restrictions.map((r, i) => (
                <React.Fragment key={r.label}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0 16px', height: 48 }}>
                    <span style={{ fontSize: 14, color: C.textPrimary }}>{r.label}</span>
                    <span style={{ fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 'var(--phx-r-full)', background: r.allowed ? 'var(--phx-positive-light)' : 'var(--phx-neutral-light)', color: r.allowed ? 'var(--phx-positive-light-fg)' : C.textSecondary }}>{r.allowed ? 'Allowed' : 'Blocked'}</span>
                  </div>
                  {i < sc.restrictions.length - 1 && <div style={{ height: 1, background: C.stroke, marginLeft: 16 }} />}
                </React.Fragment>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Transaction Detail Screen (Figma: tap a transaction row) ─────────────────

  function TransactionDetailScreen({ tx, onBack }) {
    if (!tx) return null;
    const pill = pillStyle(tx.status);
    const detailRows = [
      { label: 'Merchant',       value: tx.merchant },
      { label: 'Category',       value: tx.category },
      { label: 'Card',           value: `${tx.cardName} ${tx.cardNum}` },
      { label: 'Date',           value: tx.date },
      { label: 'Transaction ID', value: `TXN-${String(tx.id).padStart(8,'0')}` },
    ];
    return (
      <div style={{ display: 'flex', flexDirection: 'column', flex: 1, background: C.bgTertiary, overflow: 'hidden' }}>
        <div style={{ display: 'flex', alignItems: 'center', height: 56, padding: '0 16px', background: C.bgPrimary, borderBottom: `1px solid ${C.stroke}`, flexShrink: 0, position: 'relative' }}>
          <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '8px 8px 8px 0', display: 'flex', alignItems: 'center', color: C.textActive, zIndex: 1 }} onClick={onBack}><Icon name="arrow-left" size={20} /></button>
          <span style={{ position: 'absolute', left: 0, right: 0, textAlign: 'center', fontSize: 20, fontWeight: 600, letterSpacing: '-0.34px', color: C.textPrimary, pointerEvents: 'none' }}>Transaction</span>
        </div>
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {/* Hero */}
          <div style={{ background: C.bgPrimary, padding: '32px 24px 24px', textAlign: 'center', borderBottom: `1px solid ${C.stroke}` }}>
            <div style={{ fontSize: 38, fontWeight: 700, color: tx.status === 'Declined' ? C.textSecondary : C.textPrimary, textDecoration: tx.status === 'Declined' ? 'line-through' : 'none', marginBottom: 12 }}>{tx.amount}</div>
            <span style={{ fontSize: 12, fontWeight: 600, padding: '3px 12px', borderRadius: 'var(--phx-r-full)', ...pill }}>{tx.status}</span>
            {tx.declineReason && (
              <div style={{ marginTop: 12, fontSize: 13, color: C.textNeg, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4 }}>
                <span>⚠</span><span>{tx.declineReason}</span>
              </div>
            )}
            <div style={{ marginTop: 12, fontSize: 18, fontWeight: 600, color: C.textPrimary }}>{tx.merchant}</div>
          </div>
          {/* Detail rows */}
          <div style={{ background: C.bgPrimary, margin: '12px 16px 0', borderRadius: 'var(--phx-r-xl)', overflow: 'hidden', boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
            {detailRows.map((row, i) => (
              <React.Fragment key={row.label}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 16px', gap: 16 }}>
                  <span style={{ fontSize: 14, color: C.textSecondary, flexShrink: 0 }}>{row.label}</span>
                  <span style={{ fontSize: 14, color: C.textPrimary, fontWeight: 500, textAlign: 'right' }}>{row.value}</span>
                </div>
                {i < detailRows.length - 1 && <div style={{ height: 1, background: C.stroke, marginLeft: 16 }} />}
              </React.Fragment>
            ))}
          </div>
          <div style={{ background: C.bgPrimary, margin: '10px 16px 24px', borderRadius: 'var(--phx-r-xl)', overflow: 'hidden', boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
            <div style={{ display: 'flex', alignItems: 'center', padding: '0 16px', height: 52, cursor: 'pointer' }}>
              <span style={{ flex: 1, fontSize: 15, color: C.textActive }}>Dispute this transaction</span>
              <Icon name="chevron-right" size={20} color={C.textActive} />
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Deactivated Cards Screen (Figma: "Viewing deactivated cards" flow) ────────

  function DeactivatedCardsScreen({ onBack }) {
    const [pressedId, setPressedId] = useState(null);
    return (
      <div style={{ display: 'flex', flexDirection: 'column', flex: 1, background: '#1A1A1A', overflow: 'hidden' }}>
        <div style={{ display: 'flex', alignItems: 'center', height: 56, padding: '0 16px', background: '#2E2E2E', borderBottom: '1px solid rgba(255,255,255,0.08)', flexShrink: 0, position: 'relative' }}>
          <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '8px 8px 8px 0', display: 'flex', alignItems: 'center', color: 'rgba(255,255,255,0.7)', zIndex: 1 }} onClick={onBack}><Icon name="arrow-left" size={20} /></button>
          <span style={{ position: 'absolute', left: 0, right: 0, textAlign: 'center', fontSize: 20, fontWeight: 600, letterSpacing: '-0.34px', color: 'white', pointerEvents: 'none' }}>Deactivated Cards</span>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', padding: '16px 16px 0' }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'rgba(255,255,255,0.35)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 10 }}>{DEACTIVATED_CARDS.length} deactivated</div>
          <div style={{ background: '#2E2E2E', borderRadius: 'var(--phx-r-xl)', overflow: 'hidden' }}>
            {DEACTIVATED_CARDS.map((card, i) => (
              <React.Fragment key={card.id}>
                <div
                  style={{ display: 'flex', alignItems: 'center', padding: '0 16px', height: 76, cursor: 'pointer', background: pressedId === card.id ? 'rgba(255,255,255,0.06)' : 'transparent', transition: `background var(--phx-dur-fast) var(--phx-ease)` }}
                  onPointerDown={() => setPressedId(card.id)} onPointerUp={() => setPressedId(null)} onPointerLeave={() => setPressedId(null)}
                >
                  <div style={{ width: 57, height: 40, borderRadius: 'var(--phx-r-md)', background: 'linear-gradient(145deg,#3a3a3a,#252525)', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <span style={{ fontSize: 9, fontFamily: 'monospace', color: 'rgba(255,255,255,0.25)', letterSpacing: '0.5px' }}>{card.number.slice(-4)}</span>
                  </div>
                  <div style={{ flex: 1, marginLeft: 16 }}>
                    <div style={{ fontSize: 15, fontWeight: 600, color: 'rgba(255,255,255,0.6)' }}>{card.name}</div>
                    <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.3)', marginTop: 2 }}>Deactivated {card.deactivatedOn}</div>
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 600, color: 'rgba(255,255,255,0.3)', background: 'rgba(255,255,255,0.07)', borderRadius: 'var(--phx-r-full)', padding: '2px 8px' }}>Inactive</span>
                </div>
                {i < DEACTIVATED_CARDS.length - 1 && <div style={{ height: 1, background: 'rgba(255,255,255,0.05)', marginLeft: 73 }} />}
              </React.Fragment>
            ))}
          </div>
          <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.25)', textAlign: 'center', marginTop: 24, lineHeight: '20px', paddingBottom: 24 }}>
            Deactivated cards cannot be used for transactions.<br/>Contact your fleet manager to reactivate.
          </p>
        </div>
      </div>
    );
  }

  // ── Root ──────────────────────────────────────────────────────────────────────

  function App() {
    const [view, setView] = useState('list');
    const [selectedCard, setSelectedCard] = useState(null);
    const [selectedTx, setSelectedTx] = useState(null);
    const [prevView, setPrevView] = useState('list');

    const nav = (to, from) => { setPrevView(from || view); setView(to); };

    return (
      <div style={{ minHeight: '100vh', background: C.bgTertiary, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 32, gap: 40, flexWrap: 'wrap' }}>

        {/* iPhone frame */}
        <div style={{ position: 'relative' }}>
          <div style={{
            position: 'relative', display: 'flex', flexDirection: 'column', overflow: 'hidden',
            width: 375, height: 812, borderRadius: 44,
            border: '8px solid #1a1a1a',
            boxShadow: '0 0 0 1px #333, 0 40px 80px rgba(0,0,0,0.4), inset 0 0 0 1px #444',
            background: '#0F172A',
          }}>
            <div style={{ position: 'absolute', right: -12, top: 100, width: 4, height: 36, background: '#2a2a2a', borderRadius: '0 2px 2px 0' }}/>
            <div style={{ position: 'absolute', right: -12, top: 160, width: 4, height: 64, background: '#2a2a2a', borderRadius: '0 2px 2px 0' }}/>
            <div style={{ position: 'absolute', left: -12, top: 100, width: 4, height: 36, background: '#2a2a2a', borderRadius: '2px 0 0 2px' }}/>
            <div style={{ position: 'absolute', left: -12, top: 154, width: 4, height: 36, background: '#2a2a2a', borderRadius: '2px 0 0 2px' }}/>
            <div style={{ position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)', width: 120, height: 34, background: 'black', borderRadius: 17, zIndex: 50 }}/>
            {/* Home indicator */}
            <div style={{ position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)', width: 134, height: 5, background: 'rgba(0,0,0,0.35)', borderRadius: 3, zIndex: 50 }}/>
            <StatusBar />
            {view === 'list' && (
              <CardListScreen
                onCardPress={card => { setSelectedCard(card); nav('detail', 'list'); }}
                onViewTransactions={() => nav('transactions', 'list')}
                onViewDeactivated={() => nav('deactivated', 'list')}
                onViewTxDetail={tx => { setSelectedTx(tx); nav('tx-detail', 'list'); }}
              />
            )}
            {view === 'detail' && selectedCard && (
              <CardDetailScreen
                card={selectedCard}
                onBack={() => setView('list')}
                onViewSpendLimits={() => nav('spend-limits', 'detail')}
                onViewTxDetail={tx => { setSelectedTx(tx); nav('tx-detail', 'detail'); }}
                onViewAllTxs={() => nav('transactions', 'detail')}
              />
            )}
            {view === 'transactions' && (
              <TransactionsScreen
                onBack={() => setView(prevView)}
                onViewTxDetail={tx => { setSelectedTx(tx); nav('tx-detail', 'transactions'); }}
              />
            )}
            {view === 'spend-limits' && selectedCard && (
              <SpendLimitsScreen card={selectedCard} onBack={() => setView('detail')} />
            )}
            {view === 'tx-detail' && selectedTx && (
              <TransactionDetailScreen tx={selectedTx} onBack={() => setView(prevView)} />
            )}
            {view === 'deactivated' && (
              <DeactivatedCardsScreen onBack={() => setView('list')} />
            )}
          </div>
        </div>

        {/* Annotation panel */}
        <div style={{ maxWidth: 280, fontFamily: '-apple-system, BlinkMacSystemFont, Inter, sans-serif' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 6 }}>Change 1</div>
          <div style={{ fontSize: 15, fontWeight: 600, color: '#111827', marginBottom: 6 }}>Add vehicle card entry</div>
          <p style={{ fontSize: 13, color: '#6b7280', lineHeight: '1.6', margin: '0 0 20px' }}>
            Persistent tappable row below active cards. Same 57px icon zone + 48px text + ChevronRight anatomy as card rows. Opens a bottom sheet to request a card for a vehicle.
          </p>
          <div style={{ height: 1, background: '#e5e7eb', marginBottom: 20 }}/>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 6 }}>Change 2 — Ideation B</div>
          <div style={{ fontSize: 15, fontWeight: 600, color: '#111827', marginBottom: 6 }}>Recent Transactions on parent screen</div>
          <p style={{ fontSize: 13, color: '#6b7280', lineHeight: '1.6', margin: '0 0 12px' }}>
            Cross-card snapshot of 3 most recent transactions. Colored status pills. Arrow→ navigates to full history with filter chips.
          </p>
          <ul style={{ margin: 0, padding: 0, listStyle: 'none' }}>
            {['Unified view removes per-card drilling', '"Did it go through?" contacts drop', 'Mirrors Apple Card / Chase Mobile patterns', 'Declined status visible without dispatch call'].map(pt => (
              <li key={pt} style={{ display: 'flex', alignItems: 'flex-start', gap: 6, fontSize: 12, color: '#9ca3af', marginBottom: 6 }}>
                <span style={{ color: '#0073E7', flexShrink: 0, marginTop: 1 }}>•</span>{pt}
              </li>
            ))}
          </ul>
          <div style={{ height: 1, background: '#e5e7eb', margin: '16px 0' }}/>
          <div style={{ fontSize: 12, color: '#d1d5db' }}>
            Figma ref: Virtual Cards – Multiple Cards per Driver<br/>Node 2036-6406 · May 2026
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
