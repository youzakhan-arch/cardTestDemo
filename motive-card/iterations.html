<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motive Card — Mobile Iterations</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ── Driver App Core — Mobile DS tokens ─────────────────────────────── */
    :root {
      /* Always-dark surface */
      --m-dark:           #171717;
      --m-dark-active:    #2E2E2E;
      --m-dark-fg:        #ffffff;
      --m-dark-fg-sub:    rgba(255,255,255,0.57);
      --m-dark-fg-active: #0094ff;
      --m-dark-border:    rgba(255,255,255,0.09);
      /* Light surface */
      --m-bg:             #ffffff;
      --m-bg-input:       #ffffff;
      --m-bg-grey:        #f2f2f2;
      --m-border:         #E3E3E3;
      --m-fg:             #000000;
      --m-fg-sub:         rgba(0,0,0,0.63);
      --m-fg-inactive:    rgba(0,0,0,0.33);
      /* Status colors */
      --m-green:          #1B6C2D;
      --m-red:            #BD0E00;
      --m-grey-60:        #5E5E5E;
      --m-blue:           #0073E7;
      /* Motion */
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease:   ease-in-out;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #EDEFF2;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 0; height: 0; }
    button { cursor: pointer; border: none; background: none; }
    input:focus { outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- @ds-mo/icons sprite -->
  <div id="ds-mo-sprite" style="display:none;position:absolute;width:0;height:0;overflow:hidden"></div>
  <script>
    fetch('https://unpkg.com/@ds-mo/icons@4.3.1/dist/sprite.svg')
      .then(r => r.text()).then(h => { document.getElementById('ds-mo-sprite').innerHTML = h; })
      .catch(e => console.warn('@ds-mo/icons failed', e));
  </script>

  <script type="text/babel">
  const { useState, useRef, useEffect, useCallback } = React;

  /* ── Mobile DS token map ────────────────────────────────────────────── */
  const M = {
    dark:'#171717', darkActive:'#2E2E2E', darkFg:'#ffffff',
    darkFgSub:'rgba(255,255,255,0.57)', darkFgActive:'#0094ff',
    darkBorder:'rgba(255,255,255,0.09)',
    bg:'#ffffff', bgGrey:'#f2f2f2', border:'#E3E3E3',
    fg:'#000000', fgSub:'rgba(0,0,0,0.63)', fgInactive:'rgba(0,0,0,0.33)',
    green:'#1B6C2D', red:'#BD0E00', grey60:'#5E5E5E', blue:'#0073E7',
  };
  const STATUS_COLOR = { Posted: M.green, Completed: M.green, Pending: M.grey60, Declined: M.red };

  /* ── Realistic fleet data ────────────────────────────────────────────── */
  const CARDS = [
    {
      id:'card_001', type:'fuel', typeLabel:'Fuel', last4:'4242',
      cardNumber:'4242 4242 4242 4242', expiry:'12/25', zipCode:'94618',
      status:'active', gradient:['#1a3a5c','#0a7abf'],
      driver:'Sarah Chen', usageThisMonth:'$2,150.32', transactionCount:47,
      limit:3000,
    },
    {
      id:'card_002', type:'maintenance', typeLabel:'Maintenance', last4:'8765',
      cardNumber:'5432 5432 5432 8765', expiry:'08/26', zipCode:'94618',
      status:'active', gradient:['#1A535C','#2a9d8f'],
      driver:'Sarah Chen', usageThisMonth:'$847.50', transactionCount:12,
      limit:1500,
    },
    {
      id:'card_003', type:'tolls', typeLabel:'Tolls', last4:'1111',
      cardNumber:'6789 6789 6789 1111', expiry:'03/27', zipCode:'94618',
      status:'active', gradient:['#7B2D8B','#c0392b'],

    {

    },

  const TRANSACTIONS = {
    card_001: [
      { merchant:'Shell Gas Station', amount:'$62.50',  date:'Jun 4, 2026',  status:'Completed' },
      { merchant:'ARCO #2291',        amount:'$45.32',  date:'Jun 2, 2026',  status:'Completed' },
      { merchant:'Costco Fuel',        amount:'$71.25',  date:'May 31, 2026', status:'Completed' },
      { merchant:'76 Station',         amount:'$58.80',  date:'May 29, 2026', status:'Completed' },
    ],
    card_002: [
      { merchant:'AutoZone #884',      amount:'$134.99', date:'Jun 3, 2026',  status:'Completed' },
      { merchant:"O'Reilly Auto Parts",amount:'$67.45',  date:'May 28, 2026', status:'Completed' },
      { merchant:'Jiffy Lube',         amount:'$89.00',  date:'May 22, 2026', status:'Pending'   },
    ],
    card_003: [
      { merchant:'Bay Bridge Toll',    amount:'$7.00',   date:'Jun 4, 2026',  status:'Completed' },
      { merchant:'Golden Gate Toll',   amount:'$9.75',   date:'Jun 3, 2026',  status:'Completed' },
      { merchant:'I-80 Express',       amount:'$4.25',   date:'Jun 1, 2026',  status:'Completed' },
    ],
    card_004: [
      { merchant:'Marriott Hotels',    amount:'$312.00', date:'Jun 2, 2026',  status:'Completed' },
      { merchant:'Delta Airlines',     amount:'$487.50', date:'May 30, 2026', status:'Completed' },
      { merchant:'Uber Business',      amount:'$24.80',  date:'May 28, 2026', status:'Pending'   },
    ],
  };

  /* ── Icon ───────────────────────────────────────────────────────────── */
  const Icon = ({ name, size=20, color='currentColor' }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill={color} aria-hidden="true"
         style={{ display:'inline-block', flexShrink:0, verticalAlign:'middle', color }}>
      <use href={`#${name}`} />
    </svg>
  );

  /* ── Official Motive wordmark ────────────────────────────────────────── */
  const MotiveLogo = ({ width=108, height=32, color='white' }) => (
    <svg width={width} height={height} viewBox="0 0 108 24.9449" fill="none"
         preserveAspectRatio="xMidYMid meet" aria-label="Motive" style={{ display:'block' }}>
      <path d="M59.1415 10.2776V20.4907L63.3205 20.4822V24.7292H54.3866V10.2742H51.6838V6.136H54.3849V0H59.1415V6.1394H63.3205V10.2776H59.1415Z" fill={color}/>
      <path d="M70.0884 0V4.23336H70.0866V4.23676H65.3419V0H70.0884Z" fill={color}/>
      <path d="M18.3349 6.13428H12.6525L4.15861 20.4907H0V24.7376H6.64054L13.5903 12.9804V24.7292H19.1962L26.1137 12.9464V24.7292H30.8703V6.13428H25.1623L18.3349 17.6656V6.13428Z" fill={color}/>
      <path d="M65.3369 6.13428H70.0935V24.7292H65.3369V6.13428Z" fill={color}/>
      <path fillRule="evenodd" clipRule="evenodd" d="M41.999 5.91854H42.0346C47.1514 5.91854 51.2216 10.2063 51.2216 15.4317C51.2216 20.6572 47.1514 24.9449 42.0346 24.9449H41.999C36.8839 24.9449 32.7763 20.6979 32.7763 15.4317C32.7763 10.1655 36.8839 5.91854 41.999 5.91854ZM41.999 20.1883H42.0346V20.1849C44.5216 20.1849 46.4668 18.0597 46.4701 15.4317C46.4701 12.836 44.4843 10.6751 42.0346 10.6751H41.999C39.478 10.6751 37.5329 12.8003 37.5329 15.4317C37.5329 18.0631 39.478 20.1883 41.999 20.1883Z" fill={color}/>
      <path fillRule="evenodd" clipRule="evenodd" d="M99.4857 20.72C101.397 20.72 102.588 19.6039 102.912 18.6288H107.669C107.489 20.1798 105.433 24.9415 99.4823 24.9415C94.1091 24.9415 90.139 20.9018 90.139 15.4181C90.139 10.0449 94.2161 5.89646 99.3362 5.89646C104.205 5.89646 108 10.1519 108 15.3468C108 15.887 107.964 16.3932 107.929 16.7534H95.0179C95.339 19.0263 96.7099 20.72 99.4857 20.72ZM95.1691 13.3626H103.318C102.809 11.494 101.551 10.1162 99.3515 10.1162C97.0463 10.1162 95.7042 11.4515 95.1691 13.3626Z" fill={color}/>
      <path d="M81.4261 18.301L85.9585 6.13769V6.14788H91.0259L83.7891 24.7292H79.002L71.8076 6.13769H76.8938L81.4261 18.301Z" fill={color}/>
    </svg>
  );

  /* ── Status bar ──────────────────────────────────────────────────────── */
  function StatusBar() {
    return (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', height:44, padding:'0 24px', background:'#0F172A', flexShrink:0 }}>
        <span style={{ color:'white', fontSize:13, fontWeight:600, letterSpacing:'-0.3px' }}>9:41</span>
        <div style={{ display:'flex', alignItems:'center', gap:5 }}>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="white"><rect x="0" y="5" width="3" height="7" rx="0.5"/><rect x="4.5" y="3.5" width="3" height="8.5" rx="0.5"/><rect x="9" y="1.5" width="3" height="10.5" rx="0.5"/><rect x="13.5" y="0" width="3" height="12" rx="0.5"/></svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M5 7 Q8 4.5 11 7" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round"/><path d="M2.5 4.5 Q8 0 13.5 4.5" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round"/><circle cx="8" cy="10" r="1.2"/></svg>
          <div style={{ display:'flex', alignItems:'center' }}>
            <div style={{ position:'relative', border:'1px solid white', borderRadius:2, width:22, height:11 }}>
              <div style={{ position:'absolute', left:1, top:1, bottom:1, right:4, background:'white', borderRadius:1 }}/>
            </div>
            <div style={{ width:1.5, height:5, background:'rgba(255,255,255,0.6)', marginLeft:1 }}/>
          </div>
        </div>
      </div>
    );
  }

  /* ── Shared Nav drawer (Driver App Core sidebar) ─────────────────────── */
  const NAV_ITEMS = [
    { label:'Home', icon:'building-home' },
    { label:'Logs', icon:'chart' },
    { label:'Roadside Inspection', icon:'shield-circle' },
    { label:'Performance', icon:'trophy' },
    { label:'Savings Finder', icon:'target-dollar' },
    { label:'Motive Card', icon:'card', active:true },
    { label:'Messages', icon:'message-bubble-stack' },
    { label:'Notifications', icon:'bell' },
    { label:'Dispatches', icon:'location-pin-arrows' },
    { label:'Documents', icon:'document' },
    { label:'Tire Pressure', icon:'tire-pressure' },
    { label:'Settings', icon:'gear' },
    { label:'Help Center', icon:'circle-question' },
  ];

  function NavDrawer({ onClose }) {
    return (
      <>
        <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.5)', zIndex:40 }}/>
        <div style={{ position:'absolute', top:0, left:0, bottom:0, width:300, background:M.dark, zIndex:50, display:'flex', flexDirection:'column', overflowY:'auto' }}>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', padding:'48px 20px 12px 16px' }}>
            <MotiveLogo width={108} height={32} />
          </div>
          <div style={{ flex:1, display:'flex', flexDirection:'column', padding:8 }}>
            {NAV_ITEMS.map(item => (
              <div key={item.label} onClick={onClose} style={{
                display:'flex', alignItems:'center', gap:12, padding:16, borderRadius:8,
                background: item.active ? M.darkActive : 'transparent', cursor:'pointer',
              }}>
                <Icon name={item.icon} size={24} color="white" />
                <span style={{ flex:1, fontSize:16, lineHeight:'24px', letterSpacing:'-0.176px', fontWeight: item.active ? 500 : 400, color:'white' }}>{item.label}</span>
              </div>
            ))}
          </div>
          <div style={{ display:'flex', gap:12, alignItems:'center', padding:24, borderTop:`1px solid ${M.darkBorder}` }}>
            <Icon name="avatar" size={24} color="white" />
            <div style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column', gap:12 }}>
              <span style={{ fontSize:14, color:'white', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>sarah.chen@gomotive.com</span>
              <button style={{ alignSelf:'flex-start', background:M.darkActive, borderRadius:8, color:M.darkFgActive, fontSize:14, fontWeight:500, padding:'8px 16px' }}>Log out</button>
            </div>
          </div>
          <div style={{ borderTop:`1px solid ${M.darkBorder}`, padding:'12px 16px 12px 60px' }}>
            <span style={{ fontSize:12, fontWeight:500, textTransform:'uppercase', color:M.darkFgSub }}>v14.2.0</span>
          </div>
        </div>
      </>
    );
  }

  /* ── Card face visual ────────────────────────────────────────────────── */
  function CardFace({ card, width=320, height=200, showNumber=false }) {
    const r = Math.round(width * 12 / 320);
    return (
      <div style={{
        width, height, borderRadius:r, overflow:'hidden', position:'relative', flexShrink:0,
        background:`linear-gradient(145deg, ${card.gradient[0]} 0%, ${card.gradient[1]} 100%)`,
        boxShadow:'0 8px 32px rgba(0,0,0,0.35)',
      }}>
        {/* Subtle banding overlay (Figma BG component pattern) */}
        {[0,6,12,20,33,59].map((l,i) => (
          <div key={i} style={{ position:'absolute', top:0, bottom:0, left:`${l}%`, width:`${[6,6,8,13,26,41][i]}%`, background:'rgba(0,0,0,0.12)' }}/>
        ))}
        {/* Motive logo top-right */}
        <div style={{ position:'absolute', top:10, right:10 }}>
          <MotiveLogo width={Math.round(width*0.28)} height={Math.round(height*0.12)} />
        </div>
        {/* Type badge top-left */}
        <div style={{ position:'absolute', top:10, left:10, background:'rgba(255,255,255,0.18)', borderRadius:20, padding:'3px 10px' }}>
          <span style={{ fontSize:10, fontWeight:600, color:'white', letterSpacing:'0.02em' }}>{card.typeLabel.toUpperCase()}</span>
        </div>
        {/* Card number area */}
        <div style={{ position:'absolute', left:12, bottom:Math.round(height*0.28) }}>
          <div style={{ fontSize:9, color:'rgba(255,255,255,0.55)', marginBottom:4, fontWeight:500, letterSpacing:'0.05em' }}>CARD NUMBER</div>
          <div style={{ fontFamily:'monospace', fontSize:Math.round(width*0.043), color:'white', letterSpacing:'0.12em', fontWeight:600 }}>
            {showNumber ? card.cardNumber : `•••• •••• •••• ${card.last4}`}
          </div>
        </div>
        {/* Bottom row: expiry + zip + MC logo */}
        <div style={{ position:'absolute', left:12, right:12, bottom:10, display:'flex', alignItems:'flex-end', justifyContent:'space-between' }}>
          <div style={{ display:'flex', gap:20 }}>
            <div>
              <div style={{ fontSize:8, color:'rgba(255,255,255,0.5)', fontWeight:500, letterSpacing:'0.05em' }}>EXPIRES</div>
              <div style={{ fontSize:11, color:'white', fontWeight:600, marginTop:1 }}>{card.expiry}</div>
            </div>
            <div>
              <div style={{ fontSize:8, color:'rgba(255,255,255,0.5)', fontWeight:500, letterSpacing:'0.05em' }}>ZIP</div>
              <div style={{ fontSize:11, color:'white', fontWeight:600, marginTop:1 }}>{card.zipCode}</div>
            </div>
          </div>
          {/* Mastercard */}
          <div style={{ display:'flex' }}>
            <div style={{ width:Math.round(width*0.067), height:Math.round(width*0.067), borderRadius:'50%', background:'rgba(220,56,56,0.9)' }}/>
            <div style={{ width:Math.round(width*0.067), height:Math.round(width*0.067), borderRadius:'50%', background:'rgba(251,140,0,0.9)', marginLeft:-Math.round(width*0.032) }}/>
          </div>
        </div>
      </div>
    );
  }

  /* ── Compact card thumbnail (for list view) ──────────────────────────── */
  function CardThumb({ card, width=57, height=40 }) {
    return (
      <div style={{ width, height, borderRadius:4, overflow:'hidden', flexShrink:0, position:'relative',
        background:`linear-gradient(145deg, ${card.gradient[0]}, ${card.gradient[1]})` }}>
        <span style={{ position:'absolute', bottom:3, left:4, fontFamily:'monospace', fontSize:5, color:'rgba(255,255,255,0.7)', letterSpacing:'0.5px' }}>{card.last4}</span>
        <div style={{ position:'absolute', right:3, bottom:3, display:'flex' }}>
          <div style={{ width:8, height:8, borderRadius:'50%', background:'rgba(220,56,56,0.85)' }}/>
          <div style={{ width:8, height:8, borderRadius:'50%', background:'rgba(251,140,0,0.85)', marginLeft:-3 }}/>
        </div>
      </div>
    );
  }

  /* ── Transaction row ─────────────────────────────────────────────────── */
  function TxRow({ tx, last=false }) {
    const c = STATUS_COLOR[tx.status] || M.grey60;
    return (
      <>
        <div style={{ display:'flex', alignItems:'center', gap:8, padding:'0 16px' }}>
          <div style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column', gap:2, padding:'8px 0' }}>
            <div style={{ display:'flex', gap:8, fontSize:16, lineHeight:'24px', letterSpacing:'-0.176px' }}>
              <span style={{ flex:1, minWidth:0, color:M.fg, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{tx.merchant}</span>
              <span style={{ flexShrink:0, fontWeight:600, color:'rgba(0,0,0,0.82)' }}>{tx.amount}</span>
            </div>
            <div style={{ display:'flex', gap:8, fontSize:14, lineHeight:'20px', letterSpacing:'-0.0084px' }}>
              <span style={{ flex:1, color:M.fgSub }}>{tx.date}</span>
              <span style={{ flexShrink:0, color:c }}>{tx.status}</span>
            </div>
          </div>
          <Icon name="chevron-right" size={24} color={M.fgInactive} />
        </div>
        {!last && <div style={{ height:1, background:M.border }}/>}
      </>
    );
  }

  /* ── Action button (icon + label stacked) ────────────────────────────── */
  function ActionBtn({ icon, label, onDark=false, onClick, disabled=false }) {
    const fg = onDark ? 'white' : M.fg;
    const bg = onDark ? M.darkActive : M.bgGrey;
    return (
      <button onClick={onClick} disabled={disabled} style={{
        display:'flex', flexDirection:'column', alignItems:'center', gap:6,
        opacity: disabled ? 0.4 : 1, cursor: disabled ? 'default' : 'pointer',
      }}>
        <div style={{ width:44, height:44, borderRadius:22, background:bg, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <Icon name={icon} size={20} color={onDark ? 'white' : M.fg} />
        </div>
        <span style={{ fontSize:12, fontWeight:500, color:onDark ? M.darkFgSub : M.fgSub, lineHeight:'16px' }}>{label}</span>
      </button>
    );
  }

  /* ── Spend bar ───────────────────────────────────────────────────────── */
  function SpendBar({ card }) {
    const pct = Math.min(100, Math.round(parseFloat(card.usageThisMonth.replace('$','').replace(',','')) / card.limit * 100));
    const over = pct > 80;
    return (
      <div style={{ padding:'12px 16px', borderTop:`1px solid ${M.border}` }}>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6, fontSize:13, color:M.fgSub }}>
          <span>Spent this month</span>
          <span style={{ fontWeight:600, color: over ? M.red : M.fg }}>{card.usageThisMonth} <span style={{ fontWeight:400, color:M.fgSub }}>/ ${card.limit.toLocaleString()}</span></span>
        </div>
        <div style={{ height:4, borderRadius:2, background:M.border, overflow:'hidden' }}>
          <div style={{ height:'100%', width:`${pct}%`, borderRadius:2, background: over ? M.red : M.blue, transition:'width 600ms ease' }}/>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════════════════════════
     V1 — HORIZONTAL SCROLL + MORPHING STICKY CONTROLS
     Cards scroll horizontally. After first scroll, a compact sticky header
     fades in from the top showing card info + Unlock/Reveal/More controls.
  ══════════════════════════════════════════════════════════════════════════ */
  function V1({ navOpen, setNavOpen }) {
    const scrollRef = useRef(null);
    const [activeIdx, setActiveIdx] = useState(0);
    const [showSticky, setShowSticky] = useState(false);
    const [unlocked, setUnlocked] = useState({});
    const [revealed, setRevealed] = useState({});
    const card = CARDS[activeIdx];

    const handleScroll = useCallback(() => {
      const el = scrollRef.current;
      if (!el) return;
      const idx = Math.min(Math.round(el.scrollLeft / 335), CARDS.length - 1);
      setActiveIdx(idx);
      setShowSticky(el.scrollLeft > 40);
    }, []);

    useEffect(() => {
      const el = scrollRef.current;
      if (el) el.addEventListener('scroll', handleScroll, { passive:true });
      return () => el && el.removeEventListener('scroll', handleScroll);
    }, [handleScroll]);

    return (
      <div style={{ display:'flex', flexDirection:'column', flex:1, overflow:'hidden', position:'relative', background:M.bgGrey }}>
        {/* Main top bar */}
        <div style={{ background:M.dark, height:56, display:'flex', alignItems:'center', padding:'0 16px', flexShrink:0, position:'relative', zIndex:10 }}>
          <button onClick={() => setNavOpen(true)} style={{ padding:'8px 8px 8px 0', display:'flex' }}>
            <Icon name="hamburger" size={22} color="white" />
          </button>
          <span style={{ position:'absolute', left:0, right:0, textAlign:'center', fontSize:20, fontWeight:600, letterSpacing:'-0.34px', color:'white', pointerEvents:'none' }}>Motive Card</span>
        </div>

        {/* Sticky morphed header — fades in after scroll */}
        <div style={{
          position:'absolute', top:56, left:0, right:0, zIndex:30,
          background:M.dark, borderBottom:`1px solid ${M.darkBorder}`,
          opacity: showSticky ? 1 : 0,
          transform: showSticky ? 'translateY(0)' : 'translateY(-12px)',
          transition:'opacity 200ms ease-in-out, transform 250ms ease-out',
          pointerEvents: showSticky ? 'auto' : 'none',
        }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 16px 14px' }}>
            {/* Card identity */}
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <div style={{ background:'rgba(255,255,255,0.14)', borderRadius:20, padding:'3px 10px' }}>
                <span style={{ fontSize:11, fontWeight:600, color:'white', letterSpacing:'0.03em' }}>{card.typeLabel.toUpperCase()}</span>
              </div>

  /* ══════════════════════════════════════════════════════════════════════════

     Carousel snaps to cards. Controls below always act on active card.
  ══════════════════════════════════════════════════════════════════════════ */
  function V3({ navOpen, setNavOpen }) {
    const scrollRef = useRef(null);
    const [activeIdx, setActiveIdx] = useState(0);
    const [unlocked, setUnlocked] = useState({});
    const [revealed, setRevealed] = useState({});
    const card = CARDS[activeIdx];

    const handleScroll = useCallback(() => {
      const el = scrollRef.current;
      if (!el) return;
      const idx = Math.min(Math.round(el.scrollLeft / 327), CARDS.length-1);
      setActiveIdx(idx);
    }, []);

    useEffect(() => {
      const el = scrollRef.current;
      if (el) el.addEventListener('scroll', handleScroll, { passive:true });
      return () => el && el.removeEventListener('scroll', handleScroll);
    }, [handleScroll]);

    const scrollTo = (i) => {
      scrollRef.current?.scrollTo({ left: i * 327, behavior:'smooth' });
    };

    return (
      <div style={{ display:'flex', flexDirection:'column', flex:1, overflow:'hidden', position:'relative', background:M.bgGrey }}>

     modal → mock API delay → success toast → card status updates.
  ══════════════════════════════════════════════════════════════════════════ */
  function V4({ navOpen, setNavOpen }) {
    const [selected, setSelected]     = useState(null);
    const [unlockTarget, setUnlockTarget] = useState(null); // card being unlocked
    const [unlockState, setUnlockState]   = useState('idle'); // idle|confirm|loading|success
    const [unlockedCards, setUnlockedCards] = useState({});
    const [toast, setToast] = useState(null);

    const startUnlock = (card, e) => {
      e.stopPropagation();
      setUnlockTarget(card);
      setUnlockState('confirm');
    };

    const confirmUnlock = () => {
      setUnlockState('loading');
      setTimeout(() => {
        setUnlockedCards(p => ({ ...p, [unlockTarget.id]: true }));
        setUnlockState('idle');
        setUnlockTarget(null);
        setToast(`Card •••• ${unlockTarget.last4} unlocked`);
        setTimeout(() => setToast(null), 2800);

    return (
      <div style={{ display:'flex', flexDirection:'column', flex:1, overflow:'hidden', position:'relative', background:M.bgGrey }}>

          {/* 2-column grid */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            {CARDS.map(c => (
              <div key={c.id} onClick={() => setSelected(c)} style={{
                background:M.bg, borderRadius:14, overflow:'hidden',
                boxShadow:'0 2px 8px rgba(0,0,0,0.07)', cursor:'pointer',
                border: selected?.id===c.id ? `2px solid ${M.blue}` : '2px solid transparent',
                transition:'border-color 150ms ease',
              }}>
                {/* Mini card face */}
                <div style={{ padding:'10px 10px 0' }}>
                  <CardFace card={c} width={139} height={88} />
                </div>
                {/* Tile footer */}
                <div style={{ padding:'8px 10px 10px' }}>
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 }}>

                      <div style={{ width:7, height:7, borderRadius:'50%', background:M.green }}/>
                    )}
                  </div>
                  <div style={{ fontSize:13, fontWeight:600, color:M.fg }}>•••• {c.last4}</div>
                  <div style={{ fontSize:11, color:M.fgSub, marginTop:2 }}>{c.usageThisMonth} spent</div>
                  {/* Per-tile unlock button */}
                  {!unlockedCards[c.id] && (
                    <button onClick={(e) => startUnlock(c,e)} style={{
                      marginTop:8, width:'100%', height:32, borderRadius:8,
                      background:M.bgGrey, display:'flex', alignItems:'center', justifyContent:'center', gap:6,
                    }}>
                      <Icon name="lock-closed" size={13} color={M.fgSub} />
                      <span style={{ fontSize:12, fontWeight:500, color:M.fgSub }}>Unlock</span>
                    </button>
                  )}
                </div>
              </div>
            ))}
          </div>

          {/* Detail panel for selected card */}
          {selected && (
            <div style={{ background:M.bg, borderRadius:14, overflow:'hidden', boxShadow:'0 4px 8px rgba(0,0,0,0.05)', marginTop:12 }}>
              <div style={{ display:'flex', alignItems:'center', padding:'12px 16px', borderBottom:`1px solid ${M.border}` }}>
                <span style={{ flex:1, fontSize:16, fontWeight:600, color:M.fg }}>{selected.typeLabel} Card · •••• {selected.last4}</span>
                <button onClick={() => setSelected(null)}>
                  <Icon name="cross" size={16} color={M.fgSub} />
                </button>
              </div>
              <div style={{ padding:'12px 16px', borderBottom:`1px solid ${M.border}` }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6, fontSize:13, color:M.fgSub }}>
                  <span>Monthly spend</span>
                  <span style={{ fontWeight:600, color:M.fg }}>{selected.usageThisMonth}</span>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:13, color:M.fgSub }}>

                  <span style={{ fontWeight:600, color:M.fg }}>{selected.transactionCount}</span>

          <>
            <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.5)', zIndex:40 }}/>
            <div style={{
              position:'absolute', bottom:0, left:0, right:0, background:M.bg,
              borderRadius:'20px 20px 0 0', zIndex:50, padding:'24px 24px 40px',
              animation:'slideUp 220ms cubic-bezier(0.34,1.1,0.64,1)',

                  <div style={{ width:40, height:40, borderRadius:'50%', border:`3px solid ${M.border}`, borderTopColor:M.blue, margin:'0 auto 16px', animation:'spin 600ms linear infinite' }}/>
                  <style>{`@keyframes spin { to { transform:rotate(360deg); } }`}</style>
                  <div style={{ fontSize:16, fontWeight:600, color:M.fg }}>Unlocking card…</div>
                </div>
              ) : (
                <>
                  <div style={{ width:56, height:56, borderRadius:28, background:M.bgGrey, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px' }}>
                    <Icon name="lock-closed" size={24} color={M.fg} />
                  </div>
                  <div style={{ textAlign:'center', marginBottom:20 }}>
                    <div style={{ fontSize:18, fontWeight:600, color:M.fg, marginBottom:6 }}>Unlock card?</div>
                    <div style={{ fontSize:14, color:M.fgSub }}>Card ending in {unlockTarget.last4} will be activated for transactions.</div>
                  </div>
                  <button onClick={confirmUnlock} style={{ width:'100%', height:52, borderRadius:12, background:M.blue, color:'white', fontSize:16, fontWeight:600, marginBottom:12 }}>
                    Confirm Unlock
                  </button>
                  <button onClick={() => { setUnlockState('idle'); setUnlockTarget(null); }} style={{ width:'100%', height:44, borderRadius:12, background:M.bgGrey, color:M.fg, fontSize:15, fontWeight:500 }}>
                    Cancel
                  </button>
                </>
              )}
            </div>
          </>
        )}

        {/* Success toast */}
        {toast && (
          <div style={{
            position:'absolute', bottom:24, left:16, right:16, zIndex:60,
            background:'#1B6C2D', borderRadius:12, padding:'14px 16px',
            display:'flex', alignItems:'center', gap:10,
            animation:'toastIn 250ms cubic-bezier(0.34,1.56,0.64,1)',
          }}>
            <style>{`@keyframes toastIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }`}</style>
            <Icon name="check-circle" size={20} color="white" />
            <span style={{ fontSize:14, fontWeight:500, color:'white' }}>{toast}</span>
          </div>
        )}

        {navOpen && <NavDrawer onClose={() => setNavOpen(false)} />}
      </div>
    );
  }

  /* ── Phone frame wrapper ─────────────────────────────────────────────── */
  function Phone({ children }) {
    return (
      <div style={{ position:'relative' }}>
        <div style={{
          position:'relative', display:'flex', flexDirection:'column', overflow:'hidden',
          width:375, height:780, borderRadius:44,
          border:'8px solid #1a1a1a',
          boxShadow:'0 0 0 1px #333, 0 30px 60px rgba(0,0,0,0.4)',
          background:'#0F172A',
        }}>
          <div style={{ position:'absolute', top:12, left:'50%', transform:'translateX(-50%)', width:120, height:30, background:'black', borderRadius:16, zIndex:99 }}/>
          <div style={{ position:'absolute', bottom:8, left:'50%', transform:'translateX(-50%)', width:134, height:5, background:'rgba(0,0,0,0.35)', borderRadius:3, zIndex:99 }}/>
          {/* Side buttons */}
          <div style={{ position:'absolute', right:-12, top:100, width:4, height:36, background:'#2a2a2a', borderRadius:'0 2px 2px 0' }}/>
          <div style={{ position:'absolute', right:-12, top:160, width:4, height:64, background:'#2a2a2a', borderRadius:'0 2px 2px 0' }}/>
          <div style={{ position:'absolute', left:-12, top:100, width:4, height:36, background:'#2a2a2a', borderRadius:'2px 0 0 2px' }}/>
          <div style={{ position:'absolute', left:-12, top:154, width:4, height:36, background:'#2a2a2a', borderRadius:'2px 0 0 2px' }}/>
          <StatusBar />
          {children}
        </div>
      </div>
    );
  }

  /* ── Per-variation wrapper that owns navOpen state ───────────────────── */
  function VariationPhone({ Component }) {
    const [navOpen, setNavOpen] = useState(false);
    return <Phone><Component navOpen={navOpen} setNavOpen={setNavOpen} /></Phone>;
  }

  /* ── Root ────────────────────────────────────────────────────────────── */
  const VARIATIONS = [
    {
      n:'01', name:'Scroll + Morph', tag:'Spring animation',
      desc:'Horizontal snap carousel. On scroll, a sticky compact header morphs into view showing the active card identity + Unlock / Reveal / More controls with spring easing (cubic-bezier 0.34,1.56,0.64,1).',
      Comp: V1,
    },
    {
      n:'02', name:'List + Modal', tag:'Detail sheet',
      desc:'Compact vertical list of cards. Tap any row to open a bottom-sheet modal with the full card face, masked number, expiry, reveal toggle, action buttons, and recent transactions.',
      Comp: V2,
    },
    {
      n:'03', name:'Carousel + Controls', tag:'Static controls',
      desc:'Horizontal snap carousel on a dark panel. Dot pagination is tappable. Action buttons below (Unlock / Reveal / Limits / More) are always visible and update for the active card.',
      Comp: V3,
    },
    {
      n:'04', name:'Grid + Unlock', tag:'2-col grid',
      desc:'2-column card tile grid. Per-tile unlock buttons trigger a confirm modal → 700ms mock API → success toast. Tap any tile to expand a detail panel below the grid.',
      Comp: V4,
    },
  ];

  function App() {
    return (
      <div style={{ padding:'40px 8px 80px' }}>
        <div style={{ maxWidth:1700, margin:'0 auto 40px' }}>
          <h1 style={{ fontSize:30, fontWeight:800, color:'#111827', margin:'0 0 8px', letterSpacing:'-0.5px' }}>Motive Card — Mobile Iterations</h1>
          <p style={{ fontSize:15, color:'#6b7280', maxWidth:680, lineHeight:1.6, margin:0 }}>
            Four interactive UX approaches for multi-card management. Built on the Driver App Core mobile design system. All interactions are live — scroll, tap, and try the unlock flow.
          </p>
        </div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:24, justifyContent:'center', alignItems:'flex-start' }}>
          {VARIATIONS.map(v => (
            <div key={v.n} style={{ display:'flex', flexDirection:'column', alignItems:'center', width:375 }}>
              <div style={{ width:'100%', marginBottom:16 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                  <span style={{ fontSize:12, fontWeight:800, color:'#0058C8', background:'#DBEEFF', borderRadius:6, padding:'2px 8px' }}>{v.n}</span>
                  <span style={{ fontSize:18, fontWeight:700, color:'#111827' }}>{v.name}</span>
                  <span style={{ fontSize:12, fontWeight:600, color:'#6b7280', background:'#fff', border:'1px solid #e5e7eb', borderRadius:999, padding:'2px 10px' }}>{v.tag}</span>
                </div>
                <p style={{ fontSize:13, color:'#6b7280', lineHeight:1.55, margin:0, minHeight:52 }}>{v.desc}</p>
              </div>
              <VariationPhone Component={v.Comp} />
            </div>
          ))}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
