<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motive Card — Design Variations</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── PHX Design System Tokens ─────────────────────────────────────────────── */
    :root {
      --phx-bg-primary:#ffffff; --phx-bg-secondary:#FCFCFC; --phx-bg-tertiary:#F7F7F7;
      --phx-bg-active:#E5F4FF; --phx-bg-bold-accent:#0073E7; --phx-bg-negative:#EA1000;
      --phx-bg-positive:#228739; --phx-bg-caution:#9D6D00; --phx-bg-hover:rgba(0,0,0,0.05);
      --phx-bg-pressed:rgba(0,0,0,0.11); --phx-bg-inactive:rgba(0,0,0,0.05);
      --phx-content-primary:rgba(0,0,0,0.82); --phx-content-secondary:rgba(0,0,0,0.63);
      --phx-content-active:#0058C8; --phx-content-on-bold:#ffffff; --phx-content-inactive:rgba(0,0,0,0.33);
      --phx-content-negative:#BD0E00; --phx-content-positive:#1B6C2D; --phx-content-caution:#7D5800;
      --phx-stroke-default:rgba(0,0,0,0.10); --phx-stroke-active:#0073E7;
      --phx-accent-light:#DBEEFF; --phx-accent-light-fg:#0058C8;
      --phx-positive-light:#DCFCE7; --phx-positive-light-fg:#1B6C2D;
      --phx-negative-light:#FFE4E1; --phx-negative-light-fg:#BD0E00;
      --phx-caution-light:#FEF3C7; --phx-caution-light-fg:#7D5800;
      --phx-neutral-light:#F3F4F6; --phx-neutral-light-fg:rgba(0,0,0,0.63);
      --phx-r-sm:2px; --phx-r-md:4px; --phx-r-lg:8px; --phx-r-xl:12px; --phx-r-full:9999px;
      --phx-dur-fast:100ms; --phx-dur-normal:200ms; --phx-dur-slow:400ms; --phx-ease:ease-in-out;
      --summary:#2E2E2E; --sidebar:#1A1A1A; --sidebar-foreground:rgba(255,255,255,0.57);
    }
    body { margin:0; background:#EDEFF2; font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif; }
    * { box-sizing:border-box; }
    ::-webkit-scrollbar { width:0; }
    input:focus { outline:none; }
    button { cursor:pointer; border:none; background:none; padding:0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- @ds-mo/icons sprite -->
  <div id="ds-mo-sprite" style="display:none;position:absolute;width:0;height:0;overflow:hidden"></div>
  <script>
    fetch('https://unpkg.com/@ds-mo/icons@4.3.1/dist/sprite.svg')
      .then(function(r){ return r.text(); })
      .then(function(html){ document.getElementById('ds-mo-sprite').innerHTML = html; })
      .catch(function(e){ console.warn('@ds-mo/icons sprite failed to load', e); });
  </script>

  <script type="text/babel">
  const { useState } = React;

  // ── PHX token shorthands ──────────────────────────────────────────────────────
  const C = {
    bgPrimary:'var(--phx-bg-primary)', bgSecondary:'var(--phx-bg-secondary)', bgTertiary:'var(--phx-bg-tertiary)',
    bgActive:'var(--phx-bg-active)', bgAccent:'var(--phx-bg-bold-accent)', bgNegative:'var(--phx-bg-negative)',
    bgPositive:'var(--phx-bg-positive)', bgHover:'var(--phx-bg-hover)',
    textPrimary:'var(--phx-content-primary)', textSecondary:'var(--phx-content-secondary)',
    textActive:'var(--phx-content-active)', textOnBold:'var(--phx-content-on-bold)',
    textInactive:'var(--phx-content-inactive)', textNeg:'var(--phx-content-negative)',
    textPos:'var(--phx-content-positive)', textCaution:'var(--phx-content-caution)',
    stroke:'var(--phx-stroke-default)', strokeActive:'var(--phx-stroke-active)',
    rMd:'var(--phx-r-md)', rLg:'var(--phx-r-lg)', rXl:'var(--phx-r-xl)', rFull:'var(--phx-r-full)',
  };

  const Icon = ({ name, size=20, color='currentColor' }) => (
    <svg width={size} height={size} viewBox="0 0 16 16" fill={color} aria-hidden="true"
         style={{ display:'inline-block', flexShrink:0, verticalAlign:'middle' }}>
      <use href={`#${name}`} />
    </svg>
  );

  // ── Shared mock data ──────────────────────────────────────────────────────────
  const CARDS = [
    { id:'c1', name:'Truck #198344', last4:'1234', vehicle:'Truck #198344', driver:'Mike Torres', type:'physical', spent:1240, limit:2000, gradient:['#1e3a5f','#0f1f33'] },
    { id:'c2', name:'Reefer Unit 12', last4:'8910', vehicle:'Trailer #12',  driver:'Unassigned', type:'virtual',  spent:430,  limit:1500, gradient:['#2E2E2E','#1A1A1A'] },
    { id:'c3', name:'Maintenance',    last4:'2345', vehicle:'Truck #2345',  driver:'Dana Lee',    type:'physical', spent:880,  limit:1000, gradient:['#3b2f5e','#1f1633'] },
  ];
  const TX = [
    { id:1, merchant:'Pilot Flying J', cat:'Fuel',  amount:'$142.80', status:'Posted',   card:'1234', date:'Today' },
    { id:2, merchant:"Love's #218",    cat:'Fuel',  amount:'$98.50',  status:'Pending',  card:'8910', date:'Today' },
    { id:3, merchant:'AutoZone',       cat:'Parts', amount:'$54.10',  status:'Declined', card:'2345', date:'Yesterday' },
    { id:4, merchant:'TA Travel Center',cat:'Fuel', amount:'$211.40', status:'Posted',   card:'1234', date:'Yesterday' },
  ];

  const fmt = n => '$' + n.toLocaleString('en-US');
  // Driver App Core (mobile DS): status is colored text, not a pill.
  const STATUS_COLOR = { Posted:'#1B6C2D', Pending:'#5E5E5E', Declined:'#BD0E00' };

  // ── Shared building blocks ──────────────────────────────────────────────────────
  function CardArt({ card, w=120, h=78 }) {
    const s = w / 120;
    return (
      <div style={{ position:'relative', width:w, height:h, borderRadius:8*s, overflow:'hidden', flexShrink:0,
        background:`linear-gradient(145deg, ${card.gradient[0]} 0%, ${card.gradient[1]} 100%)`,
        boxShadow:'0 4px 16px rgba(0,0,0,0.25)' }}>
        <span style={{ position:'absolute', top:7*s, left:9*s, fontSize:9*s, fontWeight:700, fontStyle:'italic', color:'rgba(255,255,255,0.85)', letterSpacing:'-0.5px' }}>motive</span>
        <svg style={{ position:'absolute', top:7*s, right:7*s }} width={14*s} height={14*s} viewBox="0 0 14 14" fill="none">
          <path d="M7 3 Q11 7 7 11" stroke="rgba(255,255,255,0.5)" strokeWidth="1.2" fill="none"/>
          <path d="M7 0.5 Q13.5 7 7 13.5" stroke="rgba(255,255,255,0.3)" strokeWidth="1.2" fill="none"/>
        </svg>
        {card.type === 'physical' && (
          <div style={{ position:'absolute', left:10*s, top:30*s, width:16*s, height:12*s, borderRadius:2*s, background:'linear-gradient(135deg,#d4a843,#f5c842)' }}/>
        )}
        <span style={{ position:'absolute', fontFamily:'monospace', fontSize:7*s, color:'rgba(255,255,255,0.7)', left:10*s, bottom:18*s, letterSpacing:'1px' }}>•••• {card.last4}</span>
        <div style={{ position:'absolute', right:8*s, bottom:7*s, display:'flex' }}>
          <div style={{ width:14*s, height:14*s, borderRadius:'50%', background:'rgba(220,56,56,0.85)' }}/>
          <div style={{ width:14*s, height:14*s, borderRadius:'50%', background:'rgba(251,140,0,0.85)', marginLeft:-7*s }}/>
        </div>
      </div>
    );
  }

  function StatusBar() {
    return (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', height:44, padding:'0 24px', backgroundColor:'#0F172A', flexShrink:0 }}>
        <span style={{ color:'white', fontSize:13, fontWeight:600, letterSpacing:'-0.3px' }}>9:41</span>
        <div style={{ display:'flex', alignItems:'center', gap:5 }}>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="white"><rect x="0" y="5" width="3" height="7" rx="0.5"/><rect x="4.5" y="3.5" width="3" height="8.5" rx="0.5"/><rect x="9" y="1.5" width="3" height="10.5" rx="0.5"/><rect x="13.5" y="0" width="3" height="12" rx="0.5"/></svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M5 7 Q8 4.5 11 7" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round"/><path d="M2.5 4.5 Q8 0 13.5 4.5" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round"/><circle cx="8" cy="10" r="1.2"/></svg>
          <div style={{ display:'flex', alignItems:'center' }}>
            <div style={{ position:'relative', border:'1px solid white', borderRadius:2, width:22, height:11, display:'flex', alignItems:'center' }}>
              <div style={{ position:'absolute', left:1, top:1, bottom:1, right:4, background:'white', borderRadius:1 }}/>
            </div>
            <div style={{ width:1.5, height:5, background:'rgba(255,255,255,0.6)', borderRadius:'0 1px 1px 0', marginLeft:1 }}/>
          </div>
        </div>
      </div>
    );
  }

  function DarkHeader({ title }) {
    return (
      <div style={{ display:'flex', alignItems:'center', height:56, padding:'0 16px', background:'var(--summary)', flexShrink:0, position:'relative' }}>
        <Icon name="hamburger" size={22} color="white" />
        <span style={{ position:'absolute', left:0, right:0, textAlign:'center', fontSize:17, fontWeight:600, color:'white', pointerEvents:'none' }}>{title}</span>
      </div>
    );
  }

  // Transaction row — Driver App Core spec: merchant·amount over meta·colored status.
  function TxRow({ tx, showCard=true }) {
    const statusColor = STATUS_COLOR[tx.status] || STATUS_COLOR['Posted'];
    return (
      <div style={{ display:'flex', alignItems:'center', gap:8, padding:'0 16px' }}>
        {/* Motive convention: no avatars in transactions — card number is the identifier */}
        <div style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column', gap:2, padding:'8px 0' }}>
          <div style={{ display:'flex', gap:8, alignItems:'flex-start', fontSize:16, lineHeight:'24px', letterSpacing:'-0.176px' }}>
            <span style={{ flex:1, minWidth:0, fontWeight:400, color:'#000000', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{tx.merchant}</span>
            <span style={{ flexShrink:0, fontWeight:600, color:'rgba(0,0,0,0.82)', whiteSpace:'nowrap' }}>{tx.amount}</span>
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'flex-start', fontSize:14, fontWeight:400, lineHeight:'20px', letterSpacing:'-0.0084px' }}>
            <span style={{ flex:1, minWidth:0, color:'rgba(0,0,0,0.63)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
              {showCard ? `•••• ${tx.card}` : tx.date}
            </span>
            <span style={{ flexShrink:0, color:statusColor, whiteSpace:'nowrap' }}>{tx.status}</span>
          </div>
        </div>
        <Icon name="chevron-right" size={24} color="rgba(0,0,0,0.33)" />
      </div>
    );
  }

  function SectionHeader({ children, action }) {
    return (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 16px', height:52, borderBottom:`1px solid ${C.stroke}` }}>
        <span style={{ fontSize:18, fontWeight:600, color:C.textPrimary }}>{children}</span>
        {action && (
          <div style={{ display:'flex', alignItems:'center', gap:4, cursor:'pointer' }}>
            <span style={{ fontSize:13, fontWeight:500, color:C.textActive }}>{action}</span>
            <Icon name="arrow-right" size={16} color={C.textActive} />
          </div>
        )}
      </div>
    );
  }

  // ════════════════════════════════════════════════════════════════════════════════
  // VARIATION 1 — "Wallet" : hero card carousel (Apple Wallet pattern)
  // ════════════════════════════════════════════════════════════════════════════════
  function V1_Wallet() {
    const [active, setActive] = useState(0);
    const card = CARDS[active];
    const quick = [
      { icon:'lock-closed', label:'Lock' },
      { icon:'eye', label:'Details' },
      { icon:'card', label:'Add to Wallet' },
    ];
    return (
      <div style={{ display:'flex', flexDirection:'column', flex:1, background:C.bgTertiary, overflow:'hidden' }}>
        <DarkHeader title="Motive Card" />
        <div style={{ flex:1, overflowY:'auto' }}>
          {/* Stacked card carousel */}
          <div style={{ background:'var(--summary)', padding:'8px 0 24px' }}>
            <div style={{ display:'flex', justifyContent:'center', paddingTop:12 }}>
              <CardArt card={card} w={260} h={168} />
            </div>
            {/* Pagination dots */}
            <div style={{ display:'flex', justifyContent:'center', gap:7, marginTop:18 }}>
              {CARDS.map((_, i) => (
                <button key={i} onClick={() => setActive(i)} style={{ width: i===active?20:7, height:7, borderRadius:999, background: i===active?'white':'rgba(255,255,255,0.35)', transition:'all 200ms' }} />
              ))}
            </div>
            <div style={{ textAlign:'center', marginTop:16 }}>
              <div style={{ fontSize:18, fontWeight:700, color:'white' }}>{card.name}</div>
              <div style={{ fontSize:13, color:'rgba(255,255,255,0.6)', marginTop:2 }}>{card.driver} · •••• {card.last4}</div>
            </div>
          </div>
          {/* Quick actions */}
          <div style={{ display:'flex', justifyContent:'space-around', padding:'18px 16px', background:C.bgPrimary, borderBottom:`1px solid ${C.stroke}` }}>
            {quick.map(q => (
              <div key={q.label} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:7, cursor:'pointer' }}>
                <div style={{ width:48, height:48, borderRadius:'50%', background:C.bgActive, display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <Icon name={q.icon} size={20} color={C.textActive} />
                </div>
                <span style={{ fontSize:12, fontWeight:500, color:C.textActive }}>{q.label}</span>
              </div>
            ))}
          </div>
          {/* Limit strip */}
          <div style={{ background:C.bgPrimary, padding:'14px 16px', borderBottom:`1px solid ${C.stroke}` }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
              <span style={{ fontSize:13, color:C.textSecondary }}>This week</span>
              <span style={{ fontSize:13, color:C.textSecondary }}>{fmt(card.spent)} of {fmt(card.limit)}</span>
            </div>
            <div style={{ height:6, borderRadius:999, background:C.bgTertiary, overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${Math.min(card.spent/card.limit*100,100)}%`, borderRadius:999, background: card.spent/card.limit>0.8?C.bgNegative:C.bgAccent }}/>
            </div>
          </div>
          {/* Transactions */}
          <div style={{ background:C.bgPrimary, marginTop:10 }}>
            <SectionHeader action="All">Recent Transactions</SectionHeader>
            {TX.filter(t => t.card === card.last4).concat(TX).slice(0,3).map((tx,i) => (
              <React.Fragment key={i}>
                {i>0 && <div style={{ height:1, background:C.stroke, marginLeft:16 }}/>}
                <TxRow tx={tx} showCard={false} />
              </React.Fragment>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ════════════════════════════════════════════════════════════════════════════════
  // VARIATION 2 — "Spend Dashboard" : aggregate-spend-first, data forward
  // ════════════════════════════════════════════════════════════════════════════════
  function V2_Dashboard() {
    const total = CARDS.reduce((s,c) => s+c.spent, 0);
    const limit = CARDS.reduce((s,c) => s+c.limit, 0);
    return (
      <div style={{ display:'flex', flexDirection:'column', flex:1, background:C.bgTertiary, overflow:'hidden' }}>
        <DarkHeader title="Motive Card" />
        <div style={{ flex:1, overflowY:'auto' }}>
          {/* Hero spend summary */}
          <div style={{ background:'var(--summary)', padding:'20px 20px 26px', color:'white' }}>
            <div style={{ fontSize:12, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.08em', color:'rgba(255,255,255,0.55)', marginBottom:8 }}>Fleet spend · this week</div>
            <div style={{ display:'flex', alignItems:'baseline', gap:8, marginBottom:14 }}>
              <span style={{ fontSize:36, fontWeight:700, letterSpacing:'-1px' }}>{fmt(total)}</span>
              <span style={{ fontSize:14, color:'rgba(255,255,255,0.5)' }}>of {fmt(limit)}</span>
            </div>
            <div style={{ height:8, borderRadius:999, background:'rgba(255,255,255,0.15)', overflow:'hidden', marginBottom:8 }}>
              <div style={{ height:'100%', width:`${total/limit*100}%`, borderRadius:999, background:'#4DA3FF' }}/>
            </div>
            <div style={{ fontSize:12, color:'rgba(255,255,255,0.55)' }}>{Math.round(total/limit*100)}% used · {fmt(limit-total)} available across {CARDS.length} cards</div>
          </div>
          {/* Cards horizontal scroll */}
          <div style={{ padding:'16px 0 4px' }}>
            <div style={{ padding:'0 16px 10px', fontSize:12, fontWeight:600, color:C.textSecondary, textTransform:'uppercase', letterSpacing:'0.08em' }}>Your cards</div>
            <div style={{ display:'flex', gap:12, overflowX:'auto', padding:'0 16px 4px' }}>
              {CARDS.map(c => (
                <div key={c.id} style={{ flexShrink:0, width:150, background:C.bgPrimary, borderRadius:14, padding:12, boxShadow:'0 1px 4px rgba(0,0,0,0.06)', border:`1px solid ${C.stroke}` }}>
                  <CardArt card={c} w={126} h={80} />
                  <div style={{ fontSize:13, fontWeight:600, color:C.textPrimary, marginTop:10, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{c.name}</div>
                  <div style={{ fontSize:12, color:C.textSecondary, marginTop:2 }}>{fmt(c.spent)} spent</div>
                </div>
              ))}
              <div style={{ flexShrink:0, width:150, borderRadius:14, border:`1.5px dashed ${C.strokeActive}`, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:8, color:C.textActive, cursor:'pointer', minHeight:148 }}>
                <Icon name="plus-circle" size={26} color={C.textActive} />
                <span style={{ fontSize:13, fontWeight:600 }}>Add card</span>
              </div>
            </div>
          </div>
          {/* Transactions */}
          <div style={{ background:C.bgPrimary, marginTop:12 }}>
            <SectionHeader action="All">Recent Transactions</SectionHeader>
            {TX.slice(0,4).map((tx,i) => (
              <React.Fragment key={tx.id}>
                {i>0 && <div style={{ height:1, background:C.stroke, marginLeft:16 }}/>}
                <TxRow tx={tx} />
              </React.Fragment>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ════════════════════════════════════════════════════════════════════════════════
  // VARIATION 3 — "Card Grid" : 2-col visual tiles, scannable for larger fleets
  // ════════════════════════════════════════════════════════════════════════════════
  function V3_Grid() {
    return (
      <div style={{ display:'flex', flexDirection:'column', flex:1, background:C.bgTertiary, overflow:'hidden' }}>
        <DarkHeader title="Motive Card" />
        {/* Search */}
        <div style={{ background:C.bgPrimary, padding:'12px 16px 14px', flexShrink:0, borderBottom:`1px solid ${C.stroke}` }}>
          <div style={{ display:'flex', alignItems:'center', background:C.bgTertiary, borderRadius:10, padding:'0 12px', height:42, gap:8 }}>
            <Icon name="magnifying-glass" size={18} color={C.textSecondary} />
            <span style={{ fontSize:15, color:C.textInactive }}>Search cards</span>
          </div>
        </div>
        <div style={{ flex:1, overflowY:'auto', padding:'16px' }}>
          <div style={{ fontSize:12, fontWeight:600, color:C.textSecondary, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:12 }}>Active Cards</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            {CARDS.map(c => (
              <div key={c.id} style={{ background:C.bgPrimary, borderRadius:14, padding:12, boxShadow:'0 1px 4px rgba(0,0,0,0.06)', cursor:'pointer' }}>
                <CardArt card={c} w={145} h={92} />
                <div style={{ fontSize:14, fontWeight:600, color:C.textPrimary, marginTop:10, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{c.name}</div>
                <div style={{ fontSize:12, color:C.textSecondary, marginTop:3 }}>•••• {c.last4}</div>
                <div style={{ display:'flex', alignItems:'center', gap:5, marginTop:8 }}>
                  <span style={{ width:7, height:7, borderRadius:'50%', background: c.driver==='Unassigned'?C.textInactive:C.bgPositive }}/>
                  <span style={{ fontSize:11, color:C.textSecondary }}>{c.driver}</span>
                </div>
              </div>
            ))}
            {/* Add tile */}
            <div style={{ borderRadius:14, border:`1.5px dashed ${C.strokeActive}`, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:8, color:C.textActive, cursor:'pointer', minHeight:172 }}>
              <Icon name="plus-circle" size={28} color={C.textActive} />
              <span style={{ fontSize:13, fontWeight:600 }}>Add vehicle card</span>
              <span style={{ fontSize:10, fontWeight:600, color:'var(--phx-accent-light-fg)', background:'var(--phx-accent-light)', borderRadius:999, padding:'2px 7px' }}>Beta</span>
            </div>
          </div>
          {/* Transactions card */}
          <div style={{ background:C.bgPrimary, marginTop:16, borderRadius:14, overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,0.06)' }}>
            <SectionHeader action="All">Recent Transactions</SectionHeader>
            {TX.slice(0,3).map((tx,i) => (
              <React.Fragment key={tx.id}>
                {i>0 && <div style={{ height:1, background:C.stroke, marginLeft:16 }}/>}
                <TxRow tx={tx} />
              </React.Fragment>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ════════════════════════════════════════════════════════════════════════════════
  // VARIATION 4 — "Segmented Tabs" : navigation-forward, single-purpose views
  // ════════════════════════════════════════════════════════════════════════════════
  function V4_Tabs() {
    const [tab, setTab] = useState('Cards');
    const tabs = ['Cards', 'Activity', 'Limits'];
    return (
      <div style={{ display:'flex', flexDirection:'column', flex:1, background:C.bgTertiary, overflow:'hidden' }}>
        <div style={{ background:'var(--summary)', flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', height:56, padding:'0 16px', position:'relative' }}>
            <Icon name="hamburger" size={22} color="white" />
            <span style={{ position:'absolute', left:0, right:0, textAlign:'center', fontSize:17, fontWeight:600, color:'white', pointerEvents:'none' }}>Motive Card</span>
          </div>
          {/* Segmented control */}
          <div style={{ display:'flex', gap:4, padding:'0 16px 12px' }}>
            <div style={{ display:'flex', flex:1, background:'rgba(255,255,255,0.10)', borderRadius:10, padding:3 }}>
              {tabs.map(t => (
                <button key={t} onClick={() => setTab(t)} style={{ flex:1, height:34, borderRadius:8, fontSize:13, fontWeight:600, transition:'all 150ms',
                  background: t===tab?'white':'transparent', color: t===tab?'var(--summary)':'rgba(255,255,255,0.65)' }}>{t}</button>
              ))}
            </div>
          </div>
        </div>
        <div style={{ flex:1, overflowY:'auto' }}>
          {tab === 'Cards' && (
            <div style={{ background:C.bgPrimary, marginTop:8 }}>
              {CARDS.map((c,i) => (
                <React.Fragment key={c.id}>
                  <div style={{ display:'flex', alignItems:'center', padding:'0 16px', height:88, cursor:'pointer' }}>
                    <CardArt card={c} w={57} h={40} />
                    <div style={{ flex:1, marginLeft:16, minWidth:0 }}>
                      <div style={{ fontSize:16, fontWeight:600, color:C.textPrimary }}>{c.name}</div>
                      <div style={{ fontSize:14, color:C.textSecondary, marginTop:3 }}>•••• {c.last4} <span style={{ color:C.textInactive }}>· {c.vehicle}</span></div>
                    </div>
                    <Icon name="chevron-right" size={20} color={C.textInactive} />
                  </div>
                  {i<CARDS.length-1 && <div style={{ height:1, background:C.stroke, marginLeft:73 }}/>}
                </React.Fragment>
              ))}
              <div style={{ height:1, background:C.stroke, margin:'4px 16px' }}/>
              <div style={{ display:'flex', alignItems:'center', padding:'0 16px', height:56, cursor:'pointer' }}>
                <div style={{ width:57, height:40, borderRadius:6, background:C.bgActive, display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <Icon name="plus-circle" size={22} color={C.textActive} />
                </div>
                <span style={{ flex:1, marginLeft:16, fontSize:16, fontWeight:500, color:C.textActive }}>Add vehicle card</span>
                <Icon name="chevron-right" size={20} color={C.textActive} />
              </div>
            </div>
          )}
          {tab === 'Activity' && (
            <div style={{ background:C.bgPrimary, marginTop:8 }}>
              {TX.map((tx,i) => (
                <React.Fragment key={tx.id}>
                  {i>0 && <div style={{ height:1, background:C.stroke, marginLeft:16 }}/>}
                  <TxRow tx={tx} />
                </React.Fragment>
              ))}
            </div>
          )}
          {tab === 'Limits' && (
            <div style={{ padding:'8px 0' }}>
              {CARDS.map(c => (
                <div key={c.id} style={{ background:C.bgPrimary, margin:'8px 16px 0', borderRadius:14, padding:'14px 16px', boxShadow:'0 1px 4px rgba(0,0,0,0.06)' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
                    <span style={{ fontSize:14, fontWeight:600, color:C.textPrimary }}>{c.name}</span>
                    <span style={{ fontSize:13, color:C.textSecondary }}>{fmt(c.spent)} / {fmt(c.limit)}</span>
                  </div>
                  <div style={{ height:6, borderRadius:999, background:C.bgTertiary, overflow:'hidden' }}>
                    <div style={{ height:'100%', width:`${c.spent/c.limit*100}%`, borderRadius:999, background: c.spent/c.limit>0.8?C.bgNegative:C.bgAccent }}/>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ════════════════════════════════════════════════════════════════════════════════
  // VARIATION 5 — "Compact" : dense status-forward list for many cards
  // ════════════════════════════════════════════════════════════════════════════════
  function V5_Compact() {
    return (
      <div style={{ display:'flex', flexDirection:'column', flex:1, background:C.bgPrimary, overflow:'hidden' }}>
        <DarkHeader title="Motive Card" />
        <div style={{ flex:1, overflowY:'auto' }}>
          <div style={{ padding:'14px 16px 6px', fontSize:12, fontWeight:600, color:C.textSecondary, textTransform:'uppercase', letterSpacing:'0.08em' }}>Active Cards · {CARDS.length}</div>
          {CARDS.map((c,i) => {
            const pct = c.spent/c.limit;
            return (
              <React.Fragment key={c.id}>
                <div style={{ display:'flex', alignItems:'center', padding:'0 16px', height:64, cursor:'pointer', gap:12 }}>
                  <span style={{ width:9, height:9, borderRadius:'50%', flexShrink:0, background: pct>0.8?C.bgNegative:(c.driver==='Unassigned'?C.textInactive:C.bgPositive) }}/>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:15, fontWeight:600, color:C.textPrimary, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{c.name}</div>
                    <div style={{ fontSize:12, color:C.textSecondary, marginTop:2 }}>•••• {c.last4} · {c.driver}</div>
                  </div>
                  <div style={{ textAlign:'right', flexShrink:0 }}>
                    <div style={{ fontSize:15, fontWeight:600, color: pct>0.8?C.textNeg:C.textPrimary }}>{fmt(c.spent)}</div>
                    <div style={{ fontSize:11, color:C.textSecondary }}>of {fmt(c.limit)}</div>
                  </div>
                  <Icon name="chevron-right" size={18} color={C.textInactive} />
                </div>
                {i<CARDS.length-1 && <div style={{ height:1, background:C.stroke, marginLeft:37 }}/>}
              </React.Fragment>
            );
          })}
          {/* Transactions */}
          <div style={{ marginTop:12 }}>
            <div style={{ padding:'0 16px 6px', fontSize:12, fontWeight:600, color:C.textSecondary, textTransform:'uppercase', letterSpacing:'0.08em' }}>Recent</div>
            {TX.map((tx,i) => (
              <React.Fragment key={tx.id}>
                {i>0 && <div style={{ height:1, background:C.stroke, marginLeft:16 }}/>}
                <TxRow tx={tx} />
              </React.Fragment>
            ))}
          </div>
        </div>
        {/* Sticky bottom CTA */}
        <div style={{ flexShrink:0, padding:'10px 16px 14px', borderTop:`1px solid ${C.stroke}`, background:C.bgPrimary }}>
          <button style={{ width:'100%', height:48, borderRadius:12, background:C.bgAccent, color:C.textOnBold, fontSize:15, fontWeight:600, display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
            <Icon name="plus-circle" size={20} color="white" /> Add vehicle card
          </button>
        </div>
      </div>
    );
  }

  // ── Phone frame + layout ──────────────────────────────────────────────────────
  function Phone({ children }) {
    return (
      <div style={{ position:'relative', display:'flex', flexDirection:'column', overflow:'hidden',
        width:375, height:760, borderRadius:44, border:'8px solid #1a1a1a',
        boxShadow:'0 0 0 1px #333, 0 30px 60px rgba(0,0,0,0.35)', background:'#0F172A' }}>
        <div style={{ position:'absolute', top:12, left:'50%', transform:'translateX(-50%)', width:120, height:30, background:'black', borderRadius:16, zIndex:50 }}/>
        <div style={{ position:'absolute', bottom:8, left:'50%', transform:'translateX(-50%)', width:134, height:5, background:'rgba(0,0,0,0.35)', borderRadius:3, zIndex:50 }}/>
        <StatusBar />
        {children}
      </div>
    );
  }

  const VARIATIONS = [
    { n:'01', name:'Wallet', tag:'Hero carousel', desc:'One large swipeable card at a time (Apple Wallet pattern). Quick-action ring for Lock / Details / Add to Wallet. Best when drivers focus on one card at a time.', Comp:V1_Wallet },
    { n:'02', name:'Spend Dashboard', tag:'Data-forward', desc:'Leads with aggregate fleet spend + progress, then a horizontal card rail. Best for spend-conscious fleet managers and budget visibility.', Comp:V2_Dashboard },
    { n:'03', name:'Card Grid', tag:'Visual tiles', desc:'2-column grid of card tiles with driver status dots. Scannable for drivers/managers juggling many cards. Includes dashed Add tile.', Comp:V3_Grid },
    { n:'04', name:'Segmented Tabs', tag:'Navigation-forward', desc:'Cards / Activity / Limits segmented control keeps each view single-purpose and reduces scroll. Tap the tabs — they switch live.', Comp:V4_Tabs },
    { n:'05', name:'Compact List', tag:'Status-forward density', desc:'Dense rows with leading status dot + spend-vs-limit on the right, no card art. Fastest scanning for large fleets. Sticky bottom CTA.', Comp:V5_Compact },
  ];

  function App() {
    return (
      <div style={{ padding:'40px 32px 80px' }}>
        <div style={{ maxWidth:1400, margin:'0 auto 40px' }}>
          <h1 style={{ fontSize:30, fontWeight:800, color:'#111827', margin:'0 0 8px', letterSpacing:'-0.5px' }}>Motive Card — Home screen variations</h1>
          <p style={{ fontSize:15, color:'#6b7280', margin:0, maxWidth:640, lineHeight:1.6 }}>
            Five design directions for the same concept, all built on PHX design-system tokens and the <code style={{ background:'#fff', padding:'1px 6px', borderRadius:4, fontSize:13 }}>@ds-mo/icons</code> sprite. Same color semantics, card component, and transaction row across every option — only the information architecture changes.
          </p>
        </div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:48, justifyContent:'center', alignItems:'flex-start' }}>
          {VARIATIONS.map(v => (
            <div key={v.n} style={{ display:'flex', flexDirection:'column', alignItems:'center', width:375 }}>
              <div style={{ width:'100%', marginBottom:16 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                  <span style={{ fontSize:12, fontWeight:800, color:'#0058C8', background:'#DBEEFF', borderRadius:6, padding:'2px 8px' }}>{v.n}</span>
                  <span style={{ fontSize:18, fontWeight:700, color:'#111827' }}>{v.name}</span>
                  <span style={{ fontSize:12, fontWeight:600, color:'#6b7280', background:'#fff', border:'1px solid #e5e7eb', borderRadius:999, padding:'2px 10px' }}>{v.tag}</span>
                </div>
                <p style={{ fontSize:13, color:'#6b7280', lineHeight:1.55, margin:0, minHeight:58 }}>{v.desc}</p>
              </div>
              <Phone><v.Comp /></Phone>
            </div>
          ))}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
