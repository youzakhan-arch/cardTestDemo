<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Motive · Scratch to Reveal Card (8A)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  /* ─────────────────────────────────────────────────────────────────
     SCRATCH-TO-REVEAL MOTIVE CARD — self-contained, no dependencies.
     Drop the .scratch8a block + the <script> below into any page.
     The ONLY thing to change is the <img src> marked  ▼ YOUR CARD ▼.
     Theme via the CSS variables in .scratch8a.

     Hook: the wrapper dispatches a bubbling CustomEvent
       'scratch:revealed'  (fires exactly once per reveal)
     Reset: call  window.scratch8aReset()  to re-arm the foil.
  ───────────────────────────────────────────────────────────────── */
  .scratch8a {
    --card-w: 320px;             /* card width; height auto-locks to image aspect */
    --motive-blue: #0094FF;
    --motive-blue-dk: #0063C4;
    --ink: #0A0A0A;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    display: inline-flex; flex-direction: column; align-items: center; gap: 16px;
    user-select: none; -webkit-user-select: none;
  }
  .scratch8a__hint {
    font-size: 13px; color: #6B6B6B; font-weight: 500; letter-spacing: 0.01em;
  }
  .scratch8a__card {
    position: relative; width: var(--card-w); border-radius: 18px; overflow: hidden;
    box-shadow: 0 22px 50px rgba(0,0,0,0.45);
    transition: box-shadow .6s ease;
  }
  .scratch8a.is-revealed .scratch8a__card {
    box-shadow:
      0 22px 50px rgba(0,0,0,0.45),
      0 0 44px rgba(0, 148, 255, 0.35),  /* var(--motive-blue) glow */
      0 0 88px rgba(0, 99, 196, 0.20);   /* var(--motive-blue-dk) halo */
  }
  .scratch8a__card img {
    width: 100%; height: auto; display: block;
    -webkit-user-drag: none; user-drag: none;
  }
  .scratch8a__foil {
    position: absolute; inset: 0; width: 100%; height: 100%;
    cursor: grab; touch-action: none;
    transition: opacity .45s ease;
  }
  .scratch8a__foil:active { cursor: grabbing; }
  .scratch8a.is-revealed .scratch8a__foil { opacity: 0; pointer-events: none; }
</style>
</head>
<body style="margin:0; min-height:100vh; display:grid; place-items:center; background:#10141A;">

  <!-- ═══ THE COMPONENT ═══ -->
  <div class="scratch8a" id="scratch8a">
    <div class="scratch8a__hint" data-hint>Scratch the foil off to reveal your card</div>

    <div class="scratch8a__card">
      <!-- ▼ YOUR CARD IMAGE ▼  — replace this src with your Motive Card front -->
      <img src="assets/motive-card-front.png" alt="Motive Card" />
      <!-- ▲ YOUR CARD IMAGE ▲ -->
      <canvas class="scratch8a__foil" data-foil aria-label="Scratch to reveal"></canvas>
    </div>
  </div>
  <!-- ═══ /THE COMPONENT ═══ -->

<script>
(function () {
  const root   = document.getElementById('scratch8a');
  const card   = root.querySelector('.scratch8a__card');
  const img    = card.querySelector('img');
  const canvas = root.querySelector('[data-foil]');
  const hint   = root.querySelector('[data-hint]');
  const ctx    = canvas.getContext('2d');

  let down = false, cleared = false, sampleTick = 0;

  // Size the canvas to the card image (DPR-aware) and paint the foil.
  function paintFoil() {
    const w = card.clientWidth, h = card.clientHeight;
    if (!w || !h) return;
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.globalCompositeOperation = 'source-over';

    // Silver diagonal gradient
    const g = ctx.createLinearGradient(0, 0, w, h);
    g.addColorStop(0.00, '#9aa0a8');
    g.addColorStop(0.45, '#e9edf2');
    g.addColorStop(0.55, '#cfd4da');
    g.addColorStop(1.00, '#8b9098');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);

    // Faint diagonal white sheen stripes
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    for (let i = -h; i < w; i += 26) {
      ctx.save();
      ctx.translate(i, 0);
      ctx.rotate(0.5);
      ctx.fillRect(0, 0, 8, h * 2);
      ctx.restore();
    }

    // Centered label
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(40,46,54,0.85)';
    ctx.font = '700 14px Inter, system-ui, sans-serif';
    ctx.fillText('SCRATCH TO REVEAL', w / 2, h / 2 - 4);
    ctx.fillStyle = 'rgba(40,46,54,0.60)';
    ctx.font = '500 12px Inter, system-ui, sans-serif';
    ctx.fillText('your funded credit', w / 2, h / 2 + 16);
  }

  function erase(e) {
    if (cleared) return;
    const r = canvas.getBoundingClientRect();
    const x = (e.clientX - r.left) * (canvas.clientWidth  / r.width);
    const y = (e.clientY - r.top ) * (canvas.clientHeight / r.height);
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.beginPath();
    ctx.arc(x, y, 20, 0, Math.PI * 2);
    ctx.fill();

    // Sampling getImageData every move is expensive; check periodically.
    if ((++sampleTick % 4) === 0 && clearedRatio() > 0.5) reveal();
  }

  function clearedRatio() {
    const d = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let clear = 0, total = 0;
    // Sparse alpha sample (every 40th pixel) — fast and good enough.
    for (let i = 3; i < d.length; i += 4 * 40) {
      total++;
      if (d[i] < 20) clear++;
    }
    return total ? clear / total : 0;
  }

  function reveal() {
    if (cleared) return;
    cleared = true;
    root.classList.add('is-revealed');
    hint.textContent = 'Your Motive Card — funded and ready';
    // HOOK: external code (e.g. your CTA button) can listen for this.
    root.dispatchEvent(new CustomEvent('scratch:revealed', { bubbles: true }));
  }

  // Public reset hook — re-arms the foil.
  window.scratch8aReset = function reset() {
    cleared = false;
    sampleTick = 0;
    root.classList.remove('is-revealed');
    hint.textContent = 'Scratch the foil off to reveal your card';
    paintFoil();
  };

  // Pointer wiring — mouse + touch + pen via Pointer Events
  canvas.addEventListener('pointerdown', (e) => {
    if (cleared) return;
    down = true;
    canvas.setPointerCapture(e.pointerId);
    erase(e);
  });
  canvas.addEventListener('pointermove', (e) => { if (down) erase(e); });
  canvas.addEventListener('pointerup',     () => { down = false; });
  canvas.addEventListener('pointercancel', () => { down = false; });
  canvas.addEventListener('pointerleave',  () => { down = false; });

  // Paint once the image has sized the card; repaint on resize unless revealed.
  if (img.complete && img.naturalWidth) paintFoil();
  else img.addEventListener('load', paintFoil);
  window.addEventListener('resize', () => { if (!cleared) paintFoil(); });
})();

/* ─── Example consumer hook (delete in production) ────────────────────
   document.getElementById('scratch8a').addEventListener('scratch:revealed', () => {
     // enable / reveal your own CTA button here
   });
─────────────────────────────────────────────────────────────────────── */
</script>
</body>
</html>
